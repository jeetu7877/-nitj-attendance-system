<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NITJ Classroom — AI Attendance Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0A1628;--navy2:#0D2137;--blue:#1455B3;--blue2:#1565C0;--blue3:#1976D2;
  --sky:#2196F3;--skylt:#42A5F5;--lsky:#E3F2FD;--lsky2:#BBDEFB;
  --white:#FFFFFF;--offwhite:#F5F8FF;--bg:#EDF2FB;--bg2:#E8EFF9;
  --text:#0F1F35;--text2:#3A5275;--text3:#7A90AB;--text4:#B0C4D8;
  --border:#C8D9EE;--border2:#DDEAF7;--shadow:rgba(14,50,100,0.10);--shadow2:rgba(14,50,100,0.18);
  --green:#1B7A3E;--greenl:#E6F5EC;--greenbr:#A8D5B5;
  --red:#B91C1C;--redl:#FEE2E2;--redbr:#FCA5A5;
  --yellow:#B45309;--yellowl:#FEF3C7;--yellowbr:#FCD34D;
  --orange:#C2410C;--orangel:#FFEDD5;--orangebr:#FDB897;
  --purple:#5B21B6;--purplel:#EDE9FE;
  --radius:8px;--radius2:12px;--radius3:16px;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{font-family:var(--font);}
body{background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
#root{min-height:100vh;}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.95)}}
@keyframes scanLine{0%{top:0}100%{top:100%}}
@keyframes slideRight{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(21,101,192,.4)}50%{box-shadow:0 0 20px rgba(21,101,192,.8)}}
@keyframes toastIn{from{opacity:0;transform:translateX(120%)}to{opacity:1;transform:translateX(0)}}
.fu{animation:fadeUp .35s ease-out both;}
.fi{animation:fadeIn .3s ease-out both;}
.pi{animation:popIn .28s cubic-bezier(.34,1.56,.64,1) both;}
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}.d4{animation-delay:.24s}.d5{animation-delay:.3s}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 22px;border-radius:var(--radius);font-size:13.5px;font-weight:600;cursor:pointer;border:none;transition:all .2s cubic-bezier(.4,0,.2,1);white-space:nowrap;text-decoration:none;letter-spacing:.01em;position:relative;overflow:hidden;}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s;}
.btn:hover::after{background:rgba(255,255,255,.08);}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.52;cursor:not-allowed;pointer-events:none;}
.bp{background:linear-gradient(135deg,var(--blue) 0%,var(--blue3) 100%);color:#fff;box-shadow:0 2px 10px rgba(21,101,192,.3);}
.bp:hover{box-shadow:0 4px 18px rgba(21,101,192,.45);transform:translateY(-1px);}
.bo{background:#fff;color:var(--blue2);border:1.5px solid var(--blue2);}
.bo:hover{background:var(--lsky);box-shadow:0 2px 10px rgba(21,101,192,.15);}
.bg{background:#fff;color:var(--text2);border:1px solid var(--border);}
.bg:hover{background:var(--offwhite);border-color:var(--skylt);color:var(--text);}
.brd{background:var(--redl);color:var(--red);border:1px solid var(--redbr);}
.brd:hover{background:#FECACA;}
.bgs{background:var(--greenl);color:var(--green);border:1px solid var(--greenbr);}
.bgs:hover{background:#D1FAE5;}
.bor{background:var(--orangel);color:var(--orange);border:1px solid var(--orangebr);}
.bnv{background:var(--navy);color:#fff;}
.bnv:hover{background:var(--navy2);}
.sm{padding:6px 15px;font-size:12.5px;}
.xs{padding:4px 11px;font-size:11.5px;border-radius:6px;gap:5px;}
.icon-btn{padding:8px;border-radius:var(--radius);background:transparent;border:none;cursor:pointer;color:var(--text3);transition:all .18s;display:inline-flex;align-items:center;justify-content:center;}
.icon-btn:hover{background:var(--bg);color:var(--text2);}

/* ── Cards ── */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius2);box-shadow:0 2px 12px var(--shadow);}
.card-hover{transition:all .22s;cursor:pointer;}
.card-hover:hover{box-shadow:0 8px 28px var(--shadow2);transform:translateY(-2px);border-color:var(--lsky2);}

/* ── Inputs ── */
.inp{width:100%;padding:10px 14px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13.5px;outline:none;transition:all .18s;font-family:var(--font);}
.inp:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(21,101,192,.1);}
.inp::placeholder{color:var(--text4);}
.inp:hover:not(:focus){border-color:var(--border2);}
select.inp option{background:#fff;color:var(--text);}
textarea.inp{resize:vertical;min-height:70px;line-height:1.6;}
.inp-icon{position:relative;}.inp-icon .inp{padding-left:38px;}
.inp-icon .ic-pre{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}

/* ── Badges ── */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em;}
.bgn{background:var(--greenl);color:var(--green);}
.brd2{background:var(--redl);color:var(--red);}
.byl{background:var(--yellowl);color:var(--yellow);}
.bbl{background:var(--lsky);color:var(--blue2);}
.bnv2{background:var(--navy);color:#fff;}
.bon2{background:var(--orangel);color:var(--orange);}
.bpu{background:var(--purplel);color:var(--purple);}

/* ── Table ── */
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:11px 15px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);background:var(--offwhite);border-bottom:2px solid var(--border);}
td{padding:11px 15px;font-size:13.5px;border-bottom:1px solid var(--border2);color:var(--text);}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background .13s;}
tbody tr:hover td{background:var(--offwhite);}

/* ── Sidebar ── */
.sl{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:var(--radius);cursor:pointer;transition:all .18s;color:rgba(255,255,255,.68);font-size:13.5px;font-weight:500;user-select:none;position:relative;}
.sl:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.92);}
.sl.act{background:rgba(255,255,255,.18);color:#fff;font-weight:600;}
.sl.act::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:3px;background:var(--skylt);border-radius:0 3px 3px 0;}

/* ── Toast ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:500;animation:toastIn .35s cubic-bezier(.34,1.2,.64,1);display:flex;align-items:center;gap:10px;min-width:240px;max-width:380px;box-shadow:0 6px 24px rgba(0,0,0,.14);border-left:4px solid transparent;}
.t-s{background:#fff;border-color:var(--green);color:var(--text);}
.t-e{background:#fff;border-color:var(--red);color:var(--text);}
.t-i{background:#fff;border-color:var(--blue2);color:var(--text);}
.t-w{background:#fff;border-color:var(--yellow);color:var(--text);}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(10,22,40,.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);animation:fadeIn .2s;}
.modal{background:#fff;border-radius:var(--radius3);box-shadow:0 24px 64px rgba(0,0,0,.28);animation:popIn .28s cubic-bezier(.34,1.2,.64,1);}

/* ── Misc ── */
.lbl{font-size:11.5px;color:var(--text2);display:block;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.err-box{padding:10px 14px;background:var(--redl);border:1px solid var(--redbr);border-radius:var(--radius);font-size:12.5px;color:var(--red);display:flex;gap:8px;align-items:flex-start;line-height:1.5;}
.ok-box{padding:10px 14px;background:var(--greenl);border:1px solid var(--greenbr);border-radius:var(--radius);font-size:12.5px;color:var(--green);display:flex;gap:8px;align-items:center;}
.info-box{padding:10px 14px;background:var(--lsky);border:1px solid var(--lsky2);border-radius:var(--radius);font-size:12.5px;color:var(--blue2);display:flex;gap:8px;align-items:flex-start;line-height:1.5;}
.warn-box{padding:10px 14px;background:var(--yellowl);border:1px solid var(--yellowbr);border-radius:var(--radius);font-size:12.5px;color:var(--yellow);display:flex;gap:8px;align-items:flex-start;line-height:1.5;}
.divider{height:1px;background:var(--border2);margin:6px 0;}
.tab-bar{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:18px;overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;white-space:nowrap;font-family:var(--font);letter-spacing:.01em;}
.tab-btn.act{color:var(--blue2);border-bottom-color:var(--blue2);}
.tab-btn:hover{color:var(--blue2);}
.post-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius2);padding:18px;margin-bottom:12px;box-shadow:0 2px 8px var(--shadow);transition:box-shadow .2s;}
.post-card:hover{box-shadow:0 4px 16px var(--shadow2);}
.asgn-card{background:#fff;border:1px solid var(--border);border-left:4px solid var(--blue2);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:0 1px 6px var(--shadow);transition:all .18s;}
.asgn-card:hover{box-shadow:0 3px 14px var(--shadow2);}
.asgn-card.overdue{border-left-color:var(--red);}
.asgn-card.done{border-left-color:var(--green);}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius2);padding:20px;box-shadow:0 2px 10px var(--shadow);}
.cam-box{width:100%;background:#0a1628;border-radius:var(--radius2);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;border:2px solid var(--border);}
.scan-bar{position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--skylt),transparent);animation:scanLine 2.2s ease-in-out infinite;z-index:2;pointer-events:none;}
.cls-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius3);overflow:hidden;cursor:pointer;transition:all .22s;box-shadow:0 2px 12px var(--shadow);}
.cls-card:hover{box-shadow:0 10px 32px var(--shadow2);transform:translateY(-3px);border-color:var(--lsky2);}
.notif-item{padding:14px 18px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s;position:relative;}
.notif-item:hover{background:var(--offwhite);}
.notif-item.unread{background:linear-gradient(90deg,var(--lsky) 0%,#fff 60%);}
.notif-item.unread::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue2);}
.mono{font-family:var(--mono);}
.code-chip{font-family:var(--mono);font-size:13px;font-weight:700;background:var(--lsky);color:var(--blue2);padding:3px 10px;border-radius:6px;letter-spacing:2px;}

/* ── Auth page ── */
.auth-bg{min-height:100vh;background:linear-gradient(150deg,#0A1628 0%,#0D2748 40%,#1565C0 100%);display:flex;flex-direction:column;position:relative;overflow:hidden;}
.auth-bg::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.auth-card{background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-radius:20px;padding:36px 40px;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.2);}
.pw-strength{height:3px;border-radius:2px;transition:all .3s;margin-top:6px;}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--offwhite);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text4);}
</style>
</head>

/* ─────────── CONFIG ─────────── */
const API = window.location.hostname==="localhost"||window.location.hostname==="127.0.0.1"
  ? "http://localhost:8000" : "https://nitj-attendance-system.onrender.com";
const COLORS=["#1455B3","#0D47A1","#1B5E20","#B71C1C","#4A148C","#E65100","#00695C","#37474F","#880E4F"];
const BRANCHES=["CSE","IT","ECE","EE","ME","CE","ICE","Textile","Biotech","Civil"];
const getToken=()=>localStorage.getItem("nitj_tok");
const setToken=t=>localStorage.setItem("nitj_tok",t);
const clearToken=()=>localStorage.removeItem("nitj_tok");

/* ─────────── API helpers ─────────── */
async function api(path,opts={}){
  const tok=getToken();
  const hd={"Content-Type":"application/json",...(opts.headers||{})};
  if(tok) hd.Authorization="Bearer "+tok;
  let res;
  try{ res=await fetch(API+path,{...opts,headers:hd}); }
  catch(e){ throw new Error("Cannot reach server. Make sure backend is running."); }
  if(res.status===401){ clearToken(); window.location.reload(); return; }
  if(!res.ok){
    let msg="Error "+res.status;
    try{const e=await res.json();if(typeof e.detail==="string")msg=e.detail;else if(Array.isArray(e.detail))msg=e.detail.map(x=>x.msg||JSON.stringify(x)).join("; ");}catch{}
    throw new Error(msg);
  }
  return res.json();
}
async function apiForm(path,fd,method="POST"){
  const tok=getToken(); const hd={}; if(tok) hd.Authorization="Bearer "+tok;
  const res=await fetch(API+path,{method,headers:hd,body:fd});
  if(!res.ok){const e=await res.json().catch(()=>({detail:"Failed"})); throw new Error(e.detail||"Error");}
  return res.json();
}
function capFrame(v){
  const c=document.createElement("canvas");
  c.width=v.videoWidth||640; c.height=v.videoHeight||480;
  c.getContext("2d").drawImage(v,0,0);
  return c.toDataURL("image/jpeg",.88);
}

/* ─────────── Toast system ─────────── */
let _tset=null, _tid=0, _tarr=[];
function toast(msg,t="info"){
  const id=++_tid;
  _tarr=[..._tarr,{id,msg,t}];
  if(_tset) _tset([..._tarr]);
  setTimeout(()=>{ _tarr=_tarr.filter(x=>x.id!==id); if(_tset) _tset([..._tarr]); },4800);
}
function Toasts(){
  const[ts,set]=useState([]);
  useEffect(()=>{ _tset=set; },[]);
  const ico={success:"✅",error:"❌",warn:"⚠️",info:"ℹ️"};
  const cls={success:"t-s",error:"t-e",info:"t-i",warn:"t-w"};
  return(
    <div className="toast-wrap">
      {ts.map(x=>(
        <div key={x.id} className={"toast "+cls[x.t]}>
          <span style={{fontSize:16}}>{ico[x.t]}</span>
          <span>{x.msg}</span>
        </div>))}
    </div>);}

/* ─────────── Spinner ─────────── */
function Spin({s=18,c="#1565C0"}){
  return <div style={{width:s,height:s,border:"2.5px solid rgba(21,101,192,.2)",borderTopColor:c,borderRadius:"50%",animation:"spin .75s linear infinite",flexShrink:0,display:"inline-block"}}/>;
}

function Ic({d,s=17,c,style:st}){
  return <svg width={s} height={s} viewBox="0 0 24 24" fill={c||"currentColor"} style={st}><path d={d}/></svg>;
}

/* ── Login Form ── */
function LoginForm({onAuth,sw}){
  const[f,setF]=useState({email:"",pass:""});
  const[sp,setSp]=useState(false);
  const[ld,setLd]=useState(false);
  const[err,setErr]=useState("");
  const upd=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const sub=async e=>{
    e.preventDefault(); setErr(""); setLd(true);
    try{
      const r=await api("/login",{method:"POST",body:JSON.stringify({email:f.email,password:f.pass})});
      setToken(r.token); onAuth(); toast(r.message,"success");
    }catch(e){setErr(e.message);}
    setLd(false);
  };
  return(
    <form onSubmit={sub}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <label className="lbl">Email Address</label>
          <div className="inp-icon">
            <span className="ic-pre"><Ic d={I.usr} s={15}/></span>
            <input className="inp" type="email" placeholder="your@nitj.ac.in" value={f.email} onChange={upd("email")} required/>
          </div>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <label className="lbl" style={{margin:0}}>Password</label>
            <span style={{fontSize:11.5,color:"var(--blue2)",cursor:"pointer",fontWeight:600}} onClick={()=>sw("forgot")}>Forgot password?</span>
          </div>
          <div style={{position:"relative"}}>
            <input className="inp" type={sp?"text":"password"} placeholder="Enter your password" value={f.pass} onChange={upd("pass")} required style={{paddingRight:44}}/>
            <button type="button" onClick={()=>setSp(!sp)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"var(--text3)",display:"flex",alignItems:"center"}}>
              <Ic d={sp?I.eye:I.eyeoff} s={17}/>
            </button>
          </div>
        </div>
        {err&&<div className="err-box"><Ic d={I.warn} s={14}/>{err}</div>}
        <button className="btn bp" type="submit" disabled={ld} style={{width:"100%",padding:"12px",fontSize:14,marginTop:2}}>
          {ld?<><Spin s={16}/>Signing in...</>:<><Ic d={I.lock} s={15}/>Sign In to NITJ Classroom</>}
        </button>
        <p style={{textAlign:"center",fontSize:12.5,color:"var(--text3)"}}>
          Don't have account? <span style={{color:"var(--blue2)",cursor:"pointer",fontWeight:700}} onClick={()=>sw("reg")}>Register now →</span>
        </p>
      </div>
    </form>);}

/* ── Register Form ── */
function RegForm({onAuth,sw}){
  const[f,setF]=useState({name:"",email:"",password:"",confirm:"",department:""});
  const[sp,setSp]=useState(false); const[ld,setLd]=useState(false); const[err,setErr]=useState("");
  const upd=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const pwStrength=p=>{let s=0;if(p.length>=6)s++;if(p.length>=10)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;return s;};
  const pws=pwStrength(f.password);
  const pwColors=["#ef4444","#f97316","#eab308","#22c55e","#16a34a"];
  const pwLabels=["Too short","Weak","Fair","Good","Strong"];
  const sub=async e=>{
    e.preventDefault(); setErr("");
    if(!f.name.trim()){setErr("Full name is required.");return;}
    if(f.password!==f.confirm){setErr("Passwords do not match.");return;}
    if(f.password.length<6){setErr("Password must be at least 6 characters.");return;}
    setLd(true);
    try{
      const r=await api("/register",{method:"POST",body:JSON.stringify({name:f.name.trim(),email:f.email.toLowerCase().trim(),password:f.password,department:f.department})});
      setToken(r.token); onAuth(); toast(r.message,"success");
    }catch(e){setErr(e.message);}
    setLd(false);
  };
  return(
    <form onSubmit={sub}>
      <div style={{display:"flex",flexDirection:"column",gap:13}}>
        <div>
          <label className="lbl">Full Name *</label>
          <input className="inp" placeholder="Your full name" value={f.name} onChange={upd("name")} required/>
        </div>
        <div>
          <label className="lbl">Email Address *</label>
          <input className="inp" type="email" placeholder="your@nitj.ac.in" value={f.email} onChange={upd("email")} required/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <label className="lbl">Password *</label>
            <div style={{position:"relative"}}>
              <input className="inp" type={sp?"text":"password"} placeholder="Min 6 chars" value={f.password} onChange={upd("password")} required style={{paddingRight:38}}/>
              <button type="button" onClick={()=>setSp(!sp)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"var(--text3)",display:"flex"}}>
                <Ic d={sp?I.eye:I.eyeoff} s={15}/>
              </button>
            </div>
            {f.password&&<>
              <div className="pw-strength" style={{background:pwColors[pws-1]||"#e5e7eb",width:`${(pws/5)*100}%`}}/>
              <div style={{fontSize:10,color:pwColors[pws-1]||"#9ca3af",marginTop:3,fontWeight:600}}>{pwLabels[pws-1]||"Enter password"}</div>
            </>}
          </div>
          <div>
            <label className="lbl">Confirm *</label>
            <input className="inp" type="password" placeholder="Repeat it" value={f.confirm} onChange={upd("confirm")} required/>
            {f.confirm&&<div style={{fontSize:10,marginTop:3,fontWeight:600,color:f.password===f.confirm?"var(--green)":"var(--red)"}}>{f.password===f.confirm?"✓ Match":"✗ No match"}</div>}
          </div>
        </div>
        <div>
          <label className="lbl">Department (optional)</label>
          <input className="inp" placeholder="e.g. Computer Science & Engineering" value={f.department} onChange={upd("department")}/>
        </div>
        {err&&<div className="err-box"><Ic d={I.warn} s={14}/>{err}</div>}
        <button className="btn bp" type="submit" disabled={ld} style={{width:"100%",padding:"12px",fontSize:14,marginTop:2}}>
          {ld?<><Spin s={16}/>Creating account...</>:<><Ic d={I.chk} s={15}/>Create Account</>}
        </button>
        <p style={{textAlign:"center",fontSize:12.5,color:"var(--text3)"}}>
          Have account? <span style={{color:"var(--blue2)",cursor:"pointer",fontWeight:700}} onClick={()=>sw("login")}>Sign in →</span>
        </p>
      </div>
    </form>);}

/* ── Forgot Password (3 steps) ── */
function ForgotForm({sw}){
  const[step,setStep]=useState(1);
  const[email,setEmail]=useState("");
  const[otp,setOtp]=useState("");
  const[demoOtp,setDemoOtp]=useState("");
  const[newPwd,setNewPwd]=useState("");
  const[confirm,setConfirm]=useState("");
  const[ld,setLd]=useState(false);
  const[err,setErr]=useState("");
  const otpRefs=[useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

  const sendOtp=async e=>{
    e.preventDefault(); setErr(""); setLd(true);
    try{
      const r=await api("/forgot_password",{method:"POST",body:JSON.stringify({email:email.toLowerCase().trim()})});
      setDemoOtp(r.otp||""); setStep(2); toast("OTP sent to your email","success");
    }catch(e){setErr(e.message);}
    setLd(false);
  };
  const handleOtpKey=(i,e)=>{
    if(e.target.value&&i<5){ otpRefs[i+1]?.current?.focus(); }
    if(e.key==="Backspace"&&!e.target.value&&i>0){ otpRefs[i-1]?.current?.focus(); }
    const vals=otpRefs.map(r=>r.current?.value||"");
    vals[i]=e.target.value;
    setOtp(vals.join(""));
  };
  const resetPwd=async e=>{
    e.preventDefault(); setErr("");
    if(otp.length<6){setErr("Enter the 6-digit OTP.");return;}
    if(newPwd.length<6){setErr("Password min 6 characters.");return;}
    if(newPwd!==confirm){setErr("Passwords do not match.");return;}
    setLd(true);
    try{
      const r=await api("/verify_otp",{method:"POST",body:JSON.stringify({email:email.toLowerCase().trim(),otp,new_password:newPwd})});
      toast(r.message,"success"); setStep(3);
    }catch(e){setErr(e.message);}
    setLd(false);
  };

  if(step===3) return(
    <div style={{textAlign:"center",padding:"10px 0"}}>
      <div style={{fontSize:52,marginBottom:16}}>🎉</div>
      <h3 style={{fontSize:18,fontWeight:800,color:"var(--navy)",marginBottom:8}}>Password Reset!</h3>
      <p style={{fontSize:13,color:"var(--text2)",marginBottom:22,lineHeight:1.6}}>Your password has been updated successfully. You can now sign in with your new password.</p>
      <button className="btn bp" style={{width:"100%",padding:"12px",fontSize:14}} onClick={()=>sw("login")}>
        <Ic d={I.lock} s={15}/>Go to Sign In
      </button>
    </div>);

  if(step===2) return(
    <form onSubmit={resetPwd}>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div style={{textAlign:"center",paddingBottom:4}}>
          <div style={{fontSize:13,fontWeight:600,color:"var(--text2)"}}>OTP sent to <strong>{email}</strong></div>
          {demoOtp&&<div style={{marginTop:8,padding:"8px 14px",background:"var(--yellowl)",border:"1px solid var(--yellowbr)",borderRadius:8,fontSize:12,color:"var(--yellow)"}}>
            🧪 <strong>Demo OTP:</strong> <span className="mono" style={{fontSize:16,fontWeight:700,letterSpacing:4}}>{demoOtp}</span>
          </div>}
        </div>
        <div>
          <label className="lbl">Enter 6-Digit OTP</label>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            {[0,1,2,3,4,5].map(i=>(
              <input key={i} ref={otpRefs[i]} maxLength={1} onChange={e=>handleOtpKey(i,e)} onKeyDown={e=>handleOtpKey(i,e)}
                style={{width:46,height:52,border:"1.5px solid var(--border)",borderRadius:10,textAlign:"center",fontSize:22,fontWeight:800,fontFamily:"var(--mono)",outline:"none",transition:"border-color .18s",color:"var(--navy)"}}
                onFocus={e=>{e.target.style.borderColor="var(--blue2)";e.target.style.boxShadow="0 0 0 3px rgba(21,101,192,.1)";}}
                onBlur={e=>{e.target.style.borderColor="var(--border)";e.target.style.boxShadow="none";}}/>))}
          </div>
        </div>
        <div>
          <label className="lbl">New Password *</label>
          <input className="inp" type="password" placeholder="Minimum 6 characters" value={newPwd} onChange={e=>setNewPwd(e.target.value)} required/>
        </div>
        <div>
          <label className="lbl">Confirm Password *</label>
          <input className="inp" type="password" placeholder="Repeat password" value={confirm} onChange={e=>setConfirm(e.target.value)} required/>
        </div>
        {err&&<div className="err-box"><Ic d={I.warn} s={14}/>{err}</div>}
        <button className="btn bp" type="submit" disabled={ld} style={{width:"100%",padding:"12px",fontSize:14}}>
          {ld?<><Spin s={16}/>Resetting...</>:<><Ic d={I.key} s={15}/>Reset Password</>}
        </button>
        <p style={{textAlign:"center",fontSize:12,color:"var(--text3)",cursor:"pointer"}} onClick={()=>{setStep(1);setErr("");}}>← Back</p>
      </div>
    </form>);

  return(
    <form onSubmit={sendOtp}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.6,textAlign:"center"}}>Enter your registered email. We'll send a 6-digit OTP to reset your password.</p>
        <div>
          <label className="lbl">Registered Email</label>
          <div className="inp-icon">
            <span className="ic-pre"><Ic d={I.usr} s={15}/></span>
            <input className="inp" type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} required/>
          </div>
        </div>
        {err&&<div className="err-box"><Ic d={I.warn} s={14}/>{err}</div>}
        <button className="btn bp" type="submit" disabled={ld} style={{width:"100%",padding:"12px",fontSize:14}}>
          {ld?<><Spin s={16}/>Sending OTP...</>:<><Ic d={I.notif} s={15}/>Send OTP</>}
        </button>
        <p style={{textAlign:"center",fontSize:12.5,color:"var(--text3)"}}>
          <span style={{color:"var(--blue2)",cursor:"pointer",fontWeight:600}} onClick={()=>sw("login")}>← Back to Sign In</span>
        </p>
      </div>
    </form>);}

function CreateClassroomModal({onClose}){
  const[f,setF]=useState({name:"",subject:"",branch:"CSE",year:1,section:"A",description:"",banner_color:"#1455B3"});

    if(!f.name.trim()||!f.subject.trim()){setErr("Classroom name and subject are required.");return;}
    setLd(true); setErr("");

      const r=await api("/create_classroom",{method:"POST",body:JSON.stringify({...f,year:parseInt(f.year)})});

    }catch(e){setErr(e.message);}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>

function JoinModal({user,onClose}){
  const[f,setF]=useState({code:"",roll_number:"",branch:"CSE",year:1,section:""});
  const[camOn,setCamOn]=useState(false); const[stream,setStream]=useState(null);
  const[preview,setPreview]=useState(null); const[ld,setLd]=useState(false); const[err,setErr]=useState("");
  const vidRef=useRef(null);
  const startCam=async()=>{
    try{const s=await navigator.mediaDevices.getUserMedia({video:{width:480,height:360,facingMode:"user"}});
      setStream(s);setCamOn(true);setTimeout(()=>{if(vidRef.current)vidRef.current.srcObject=s;},100);}
    catch{setErr("Camera access denied. Please allow camera access.");}
  };
  const stopCam=()=>{stream?.getTracks().forEach(t=>t.stop());setStream(null);setCamOn(false);};
  useEffect(()=>()=>stopCam(),[]);
  const capture=()=>{if(!vidRef.current)return;setPreview(capFrame(vidRef.current));stopCam();setErr("");};
  const join=async()=>{
    if(!f.code.trim()){setErr("Please enter the classroom code.");return;}
    if(!f.roll_number.trim()){setErr("Roll number is required.");return;}
    setLd(true); setErr("");
    try{
      const r=await api("/join_classroom",{method:"POST",body:JSON.stringify({...f,code:f.code.trim().toUpperCase(),year:parseInt(f.year),image:preview||""})});
      toast(r.message,"success"); onClose();
    }catch(e){setErr(e.message);}
    setLd(false);
  };
  const upd=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  return(
    <div className="modal-bg">
      <div className="modal" style={{padding:26,width:"100%",maxWidth:560,maxHeight:"94vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:20,alignItems:"flex-start"}}>

          </div>
          <button className="icon-btn" onClick={onClose}><Ic d={I.x} s={18}/></button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>

/* ─── STUDENT FACE ENROLL ─── */
function StudentFaceEnroll({cls}){
  const[camOn,setCamOn]=useState(false); const[stream,setStream]=useState(null);
  const[preview,setPreview]=useState(null); const[ld,setLd]=useState(false);
  const[info,setInfo]=useState(null); const[loadingInfo,setLoadingInfo]=useState(true);
  const vidRef=useRef(null);
  useEffect(()=>{ api("/classroom/"+cls.id).then(d=>setInfo(d)).catch(()=>{}).finally(()=>setLoadingInfo(false)); },[]);
  const startCam=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});setStream(s);setCamOn(true);setTimeout(()=>{if(vidRef.current)vidRef.current.srcObject=s;},100);}catch{toast("Camera access denied","error");}};
  const stopCam=()=>{stream?.getTracks().forEach(t=>t.stop());setStream(null);setCamOn(false);};
  useEffect(()=>()=>stopCam(),[]);
  const capture=()=>{if(!vidRef.current)return;setPreview(capFrame(vidRef.current));stopCam();};
  const enroll=async()=>{
    if(!preview){toast("Please capture your face first","error");return;}
    setLd(true);
    const fd=new FormData(); fd.append("classroom_id",cls.id); fd.append("image",preview);
    try{const r=await apiForm("/enroll_face",fd);toast(r.message,"success");setPreview(null);api("/classroom/"+cls.id).then(d=>setInfo(d));}
    catch(e){toast(e.message,"error");}
    setLd(false);
  };
  if(loadingInfo) return <div style={{padding:40,textAlign:"center"}}><Spin s={28}/></div>;
  const locked=info?.face_enrolled&&info?.face_locked;
  return(
    <div style={{maxWidth:560}}>
      <div className="card" style={{padding:22}}>
        <h3 style={{fontSize:15,fontWeight:800,color:"var(--navy)",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
          <Ic d={I.face} s={18} c="var(--blue2)"/>Face Registration Status
        </h3>
        {locked
          ?<div>
            <div className="ok-box" style={{marginBottom:14}}>
              <Ic d={I.chk} s={16}/>Your face is enrolled and locked for this classroom.
            </div>
            <div className="info-box"><Ic d={I.lock} s={14}/>
              <span>Your face data is <strong>locked</strong>. Contact your classroom admin to reset it if needed.</span>
            </div>
            {info.face_updated_at&&<div style={{marginTop:12,fontSize:11.5,color:"var(--text3)",fontWeight:500}}>
              Last updated: {info.face_updated_at?.split("T")?.[0]}
            </div>}
          </div>
          :<div>
            <div className="warn-box" style={{marginBottom:14}}><Ic d={I.warn} s={14}/>
              Face not enrolled. You won't be marked present by AI attendance.
            </div>
            <div className="cam-box" style={{aspectRatio:"4/3",maxHeight:230,marginBottom:14}}>
              {camOn?<video ref={vidRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              :preview?<img src={preview} alt="face" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              :<div style={{textAlign:"center",padding:36,color:"#6b7280"}}>
                <Ic d={I.face} s={44} c="#374151"/>
                <div style={{fontSize:12.5,marginTop:10,color:"#9ca3af"}}>No face captured yet</div>
              </div>}
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
              {!camOn&&!preview&&<button className="btn bg sm" onClick={startCam}><Ic d={I.cam} s={13}/>Open Camera</button>}
              {camOn&&<>
                <button className="btn bgs sm" onClick={capture}><Ic d={I.face} s={13}/>Capture Face</button>
                <button className="btn bg sm" onClick={stopCam}><Ic d={I.x} s={13}/>Cancel</button>
              </>}
              {preview&&<>
                <button className="btn bp sm" onClick={enroll} disabled={ld}>
                  {ld?<><Spin s={13}/>Enrolling...</>:<><Ic d={I.lock} s={13}/>Enroll & Lock Face</>}
                </button>
                <button className="btn bg sm" onClick={()=>{setPreview(null);startCam();}}><Ic d={I.ref} s={13}/>Retake</button>
              </>}
            </div>
            <div className="warn-box"><Ic d={I.warn} s={13}/>
              <span>Once enrolled, your face is <strong>locked</strong>. Admin must reset to make changes.</span>
            </div>
          </div>}
      </div>
    </div>);}

/* ─── CLASS FEED ─── */
function ClassFeed({cls,isAdmin,user}){
  const[posts,setPosts]=useState([]); const[ld,setLd]=useState(true);
  const[showPost,setShowPost]=useState(false);
  const[form,setForm]=useState({title:"",content:"",type:"announcement"});
  const[posting,setPosting]=useState(false);
  const load=async()=>{ setLd(true); try{setPosts(await api("/posts/"+cls.id));}catch(e){toast(e.message,"error");} setLd(false); };
  useEffect(()=>{load();},[cls.id]);
  const submit=async()=>{
    if(!form.title.trim()){toast("Title is required","error");return;}
    setPosting(true);
    try{await api("/post",{method:"POST",body:JSON.stringify({classroom_id:cls.id,...form})});toast("Posted!","success");setShowPost(false);setForm({title:"",content:"",type:"announcement"});load();}
    catch(e){toast(e.message,"error");}
    setPosting(false);
  };
  const delPost=async pid=>{
    try{await api("/post/"+pid,{method:"DELETE"});toast("Deleted","success");load();}
    catch(e){toast(e.message,"error");}
  };
  return(
    <div>
      {isAdmin&&(
        <div className="card" style={{padding:16,marginBottom:14}}>
          {!showPost
            ?<div style={{display:"flex",gap:10}}>
              <button className="btn bp sm" onClick={()=>setShowPost(true)}><Ic d={I.ann} s={13}/>Post Announcement</button>
              <button className="btn bo sm" onClick={()=>{setForm(p=>({...p,type:"material"}));setShowPost(true);}}><Ic d={I.upl} s={13}/>Share Material</button>
            </div>
            :<div style={{display:"flex",flexDirection:"column",gap:11}}>
              <div style={{display:"flex",gap:8}}>
                {[["announcement","📢 Announcement"],["material","📄 Material"]].map(([v,l])=>(
                  <button key={v} className={"btn sm"+(form.type===v?" bp":" bg")} onClick={()=>setForm(p=>({...p,type:v}))}>{l}</button>))}
              </div>
              <input className="inp" placeholder="Title *" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>
              <textarea className="inp" placeholder="Content (optional)..." value={form.content} onChange={e=>setForm(p=>({...p,content:e.target.value}))}/>
              <div style={{display:"flex",gap:8}}>
                <button className="btn bp sm" onClick={submit} disabled={posting}>{posting?<><Spin s={13}/>Posting...</>:"✓ Post"}</button>
                <button className="btn bg sm" onClick={()=>setShowPost(false)}>Cancel</button>
              </div>
            </div>}
        </div>)}
      {ld?<div style={{padding:36,textAlign:"center"}}><Spin s={28}/></div>
      :posts.length===0
        ?<div className="card" style={{padding:40,textAlign:"center",color:"var(--text3)"}}>
          <Ic d={I.ann} s={38} c="var(--border)"/>
          <div style={{fontSize:13.5,marginTop:10,fontWeight:500}}>No posts yet</div>
          {isAdmin&&<div style={{fontSize:12.5,marginTop:4}}>Post an announcement to get started</div>}
        </div>
        :posts.map(p=><PostCard key={p.id} post={p} isAdmin={isAdmin} onDelete={()=>delPost(p.id)}/>)}
    </div>);}

function PostCard({post,isAdmin,onDelete}){
  const[showC,setShowC]=useState(false); const[cmts,setCmts]=useState([]); const[cmt,setCmt]=useState(""); const[ldC,setLdC]=useState(false);
  const loadC=async()=>{ setLdC(true); try{setCmts(await api("/comments/"+post.id));}catch{} setLdC(false); };
  const addC=async()=>{
    if(!cmt.trim())return;
    try{await api("/comment",{method:"POST",body:JSON.stringify({post_id:post.id,comment:cmt})});setCmt("");loadC();}
    catch(e){toast(e.message,"error");}
  };
  useEffect(()=>{if(showC)loadC();},[showC]);
  const isAnn=post.type==="announcement";
  return(
    <div className="post-card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:11}}>
        <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
          <div style={{width:40,height:40,background:isAnn?"var(--lsky)":"var(--greenl)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,border:"1px solid "+(isAnn?"var(--lsky2)":"var(--greenbr)")}}>
            {isAnn?"📢":"📄"}
          </div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"var(--navy)",letterSpacing:"-.01em"}}>{post.title}</div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:2,fontWeight:500}}>
              {post.user_name} · {post.created_at?.split("T")?.[0]}
            </div>
          </div>
        </div>
        {isAdmin&&<button className="btn xs brd" onClick={onDelete}><Ic d={I.del} s={12}/>Delete</button>}
      </div>
      {post.content&&<p style={{fontSize:13.5,color:"var(--text2)",marginBottom:11,lineHeight:1.65}}>{post.content}</p>}
      {post.file_url&&<a href={API+post.file_url} target="_blank" rel="noreferrer" className="btn bg sm" style={{marginBottom:11,display:"inline-flex"}}>
        <Ic d={I.dl} s={13}/>Download: {post.file_name||"File"}
      </a>}
      <div style={{borderTop:"1px solid var(--border2)",paddingTop:10,marginTop:4}}>
        <button className="btn bg xs" onClick={()=>setShowC(!showC)}>
          💬 {post.comment_count||0} Comment{post.comment_count!==1?"s":""}
        </button>
        {showC&&(
          <div style={{marginTop:12}}>
            {ldC?<Spin s={16}/>:cmts.map(c=>(
              <div key={c.id} style={{padding:"9px 12px",background:"var(--offwhite)",borderRadius:9,marginBottom:7,border:"1px solid var(--border2)"}}>
                <div style={{fontSize:12,fontWeight:700,color:"var(--navy)"}}>{c.user_name}</div>
                <div style={{fontSize:13,color:"var(--text2)",marginTop:3,lineHeight:1.5}}>{c.comment}</div>
              </div>))}
            <div style={{display:"flex",gap:8,marginTop:9}}>
              <input className="inp" style={{flex:1,fontSize:13,padding:"8px 12px"}} placeholder="Write a comment..." value={cmt} onChange={e=>setCmt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&addC()}/>
              <button className="btn bp sm" onClick={addC}>Post</button>
            </div>
          </div>)}
      </div>
    </div>);}

/* ─── MEMBERS ─── */
function MembersView({cls,isAdmin}){
  const[members,setMembers]=useState([]); const[ld,setLd]=useState(true);
  const[resetModal,setResetModal]=useState(null);
  const[clearTarget,setClearTarget]=useState(null);
  const load=()=>{ setLd(true); api("/classroom/"+cls.id+"/members").then(setMembers).catch(e=>toast(e.message,"error")).finally(()=>setLd(false)); };
  useEffect(()=>{load();},[cls.id]);
  const remove=async(uid,name)=>{
    if(!confirm(`Remove ${name} from this classroom?`))return;
    try{await api("/classroom/"+cls.id+"/remove/"+uid,{method:"DELETE"});toast(name+" removed","success");load();}
    catch(e){toast(e.message,"error");}
  };
  const clearFace=async()=>{
    if(!clearTarget)return;
    const fd=new FormData();fd.append("classroom_id",cls.id);fd.append("student_id",clearTarget.id);fd.append("notes","Cleared by admin via Members UI");
    try{const r=await apiForm("/admin_clear_face",fd);toast(r.message,"success");setClearTarget(null);load();}
    catch(e){toast(e.message,"error");}
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {resetModal&&<AdminFaceResetModal cls={cls} student={resetModal} onClose={()=>{setResetModal(null);load();}}/>}

        <div className="modal-bg">
          <div className="modal" style={{padding:28,maxWidth:390,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:14}}>🗑️</div>
            <h3 style={{fontSize:18,fontWeight:800,color:"var(--navy)",marginBottom:8}}>Clear Face Data</h3>
            <p style={{fontSize:13,color:"var(--text2)",marginBottom:20,lineHeight:1.6}}>
              Clear face data for <strong>{clearTarget.name}</strong>? They'll need to re-enroll themselves.
            </p>
            <div style={{display:"flex",gap:10}}>
              <button className="btn brd" style={{flex:1}} onClick={clearFace}><Ic d={I.del} s={14}/>Yes, Clear</button>
              <button className="btn bg" style={{flex:1}} onClick={()=>setClearTarget(null)}>Cancel</button>
            </div>
          </div>

/* Admin Face Reset Modal */
function AdminFaceResetModal({cls,student,onClose}){
  const[camOn,setCamOn]=useState(false); const[stream,setStream]=useState(null);
  const[preview,setPreview]=useState(null); const[notes,setNotes]=useState(""); const[ld,setLd]=useState(false);
  const vidRef=useRef(null);
  const startCam=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});setStream(s);setCamOn(true);setTimeout(()=>{if(vidRef.current)vidRef.current.srcObject=s;},100);}catch{toast("Camera denied","error");}};
  const stopCam=()=>{stream?.getTracks().forEach(t=>t.stop());setStream(null);setCamOn(false);};
  useEffect(()=>()=>stopCam(),[]);
  const capture=()=>{if(!vidRef.current)return;setPreview(capFrame(vidRef.current));stopCam();};
  const reset=async()=>{
    if(!preview){toast("Capture face first","error");return;}
    setLd(true);
    try{const r=await api("/admin_reset_face",{method:"POST",body:JSON.stringify({classroom_id:cls.id,student_id:student.id,image:preview,notes})});
      toast(r.message,"success");onClose();}
    catch(e){toast(e.message,"error");}
    setLd(false);
  };
  return(
    <div className="modal-bg">
      <div className="modal" style={{padding:26,width:"100%",maxWidth:490,maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,alignItems:"flex-start"}}>
          <div>
            <h3 style={{fontSize:16,fontWeight:800,color:"var(--navy)"}}>🔄 Admin Face Reset</h3>
            <p style={{fontSize:12,color:"var(--text3)",marginTop:3}}>Resetting for: <strong>{student.name}</strong></p>
          </div>
          <button className="icon-btn" onClick={onClose}><Ic d={I.x} s={18}/></button>
        </div>
        <div className="warn-box" style={{marginBottom:14}}><Ic d={I.warn} s={13}/>
          Have the student stand in front of camera. This replaces their existing face data.
        </div>
        <div className="cam-box" style={{aspectRatio:"4/3",maxHeight:220,marginBottom:12}}>
          {camOn?<video ref={vidRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          :preview?<img src={preview} alt="face" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          :<div style={{textAlign:"center",padding:36,color:"#6b7280"}}>
            <Ic d={I.face} s={44} c="#374151"/><div style={{fontSize:12.5,marginTop:10,color:"#9ca3af"}}>No face captured</div>
          </div>}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          {!camOn&&!preview&&<button className="btn bg sm" onClick={startCam}><Ic d={I.cam} s={13}/>Open Camera</button>}
          {camOn&&<><button className="btn bgs sm" onClick={capture}><Ic d={I.face} s={13}/>Capture</button>
            <button className="btn bg sm" onClick={stopCam}><Ic d={I.x} s={13}/>Cancel</button></>}
          {preview&&<><div className="ok-box" style={{flex:1,fontSize:12}}><Ic d={I.chk} s={13}/>Face captured</div>
            <button className="btn bg sm" onClick={()=>{setPreview(null);startCam();}}><Ic d={I.ref} s={13}/>Retake</button></>}
        </div>
        <div style={{marginBottom:14}}>
          <label className="lbl">Notes (optional)</label>
          <input className="inp" placeholder="Reason for reset..." value={notes} onChange={e=>setNotes(e.target.value)}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="btn bp" style={{flex:1,padding:"11px"}} onClick={reset} disabled={ld||!preview}>
            {ld?<><Spin s={14}/>Resetting...</>:<><Ic d={I.shield} s={14}/>Reset Face Data</>}
          </button>
          <button className="btn bg" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>);}

    try{const r=await apiForm("/upload_material",fd);toast(r.message,"success");setTitle("");setContent("");setFile(null);}
    catch(e){toast(e.message,"error");}
    setLd(false);
  };
  return(
    <div className="card" style={{padding:24,maxWidth:600}}>
      <h3 style={{fontSize:15,fontWeight:800,color:"var(--navy)",marginBottom:18,display:"flex",alignItems:"center",gap:8}}>
        <Ic d={I.upl} s={18} c="var(--blue2)"/>Upload Study Material / Notes
      </h3>
      <div style={{display:"flex",flexDirection:"column",gap:13}}>
        <div><label className="lbl">Title *</label><input className="inp" placeholder="e.g. Chapter 5 — Sorting Algorithms" value={title} onChange={e=>setTitle(e.target.value)}/></div>
        <div><label className="lbl">Description (optional)</label><textarea className="inp" placeholder="Brief description..." value={content} onChange={e=>setContent(e.target.value)}/></div>
        <div><label className="lbl">File (PDF, PPT, DOC, etc.)</label>
          <input type="file" accept=".pdf,.ppt,.pptx,.doc,.docx,.txt,.png,.jpg,.jpeg" onChange={e=>setFile(e.target.files[0])}
            style={{width:"100%",padding:"10px 13px",border:"1.5px solid var(--border)",borderRadius:8,fontSize:12.5,color:"var(--text2)",cursor:"pointer"}}/>
        </div>
        {file&&<div className="ok-box"><Ic d={I.chk} s={14}/>Selected: {file.name}</div>}
        <button className="btn bp" style={{alignSelf:"flex-start"}} onClick={sub} disabled={ld}>
          {ld?<><Spin s={14}/>Uploading...</>:<><Ic d={I.upl} s={14}/>Upload Material</>}
        </button>
      </div>
    </div>);}

/* ─── TAKE ATTENDANCE (AI) ─── */
function TakeAttendance({cls}){
  const[camOn,setCamOn]=useState(false); const[recog,setRecog]=useState(false);
  const[detected,setDetected]=useState([]); const[stream,setStream]=useState(null); const[ok,setOk]=useState(true);
  const vidRef=useRef(null); const intRef=useRef(null);
  const startCam=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
      setStream(s); setCamOn(true);
      setTimeout(()=>{if(vidRef.current)vidRef.current.srcObject=s;},100);
      toast("Camera ready","success");
    }catch{toast("Camera access denied","error");}
  };
  const stopAll=()=>{stream?.getTracks().forEach(t=>t.stop());setStream(null);setCamOn(false);setRecog(false);if(intRef.current)clearInterval(intRef.current);};
  useEffect(()=>()=>stopAll(),[]);
  const startRecog=()=>{
    setRecog(true);
    toast("AI Attendance started — scanning every 3 seconds","info");
    intRef.current=setInterval(async()=>{
      if(!vidRef.current||vidRef.current.readyState<2)return;
      try{
        const res=await api("/recognize",{method:"POST",body:JSON.stringify({classroom_id:cls.id,image:capFrame(vidRef.current)})});
        setOk(true);
        if(!res.results||res.status==="no_face")return;
        for(const r of res.results){
          const ts=new Date().toLocaleTimeString();
          setDetected(p=>[{...r,ts},...p].slice(0,40));
          if(r.status==="present") toast(`✅ ${r.name} — ${r.confidence?.toFixed(1)}%`,"success");
          else if(r.status==="duplicate") toast(`🔁 ${r.name} already marked`,"info");
          else if(r.status==="unknown") toast("❓ Unknown face detected","warn");
          else if(r.status==="error"&&r.message) toast(r.message,"error");
        }
      }catch(e){setOk(false);setRecog(false);clearInterval(intRef.current);toast(e.message,"error");}
    },3000);
  };
  const markAbsent=async()=>{
    try{const r=await api("/mark_absent/"+cls.id,{method:"POST"});toast(r.message,"success");}
    catch(e){toast(e.message,"error");}
  };
  const uniquePresent=[...new Set(detected.filter(d=>d.status==="present").map(d=>d.name))].length;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Controls */}
      <div className="card" style={{padding:16}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          {!camOn
            ?<button className="btn bp" onClick={startCam}><Ic d={I.cam} s={15}/>Start Camera</button>
            :<button className="btn brd" onClick={stopAll}><Ic d={I.x} s={15}/>Stop All</button>}
          {camOn&&!recog&&<button className="btn bgs" onClick={startRecog}><Ic d={I.face} s={15}/>Start AI Recognition</button>}
          {recog&&<button className="btn bg" onClick={()=>{setRecog(false);clearInterval(intRef.current);}}><Ic d={I.x} s={15}/>Pause Recognition</button>}
          {detected.length>0&&<button className="btn bg sm" onClick={markAbsent}><Ic d={I.atd} s={14}/>Mark Remaining Absent</button>}
          {detected.length>0&&<button className="btn bg sm" onClick={()=>setDetected([])}><Ic d={I.del} s={14}/>Clear Log</button>}
          {!ok&&<span style={{fontSize:12,color:"var(--red)",fontWeight:700,display:"flex",alignItems:"center",gap:5}}><Ic d={I.warn} s={14}/>Backend offline</span>}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:14}}>
        {/* Camera */}
        <div className="card" style={{padding:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h3 style={{fontSize:14.5,fontWeight:800,color:"var(--navy)"}}>📷 Live Camera Feed</h3>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {recog&&<span className="bdg bgn" style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{width:7,height:7,background:"var(--green)",borderRadius:"50%",display:"inline-block",animation:"pulse 1.5s infinite"}}/>LIVE
              </span>}
              {uniquePresent>0&&<span className="bdg bbl">{uniquePresent} present</span>}
            </div>
          </div>
          <div className="cam-box" style={{aspectRatio:"16/9",borderColor:camOn?"var(--blue2)":"var(--border)"}}>
            {camOn
              ?<><video ref={vidRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>{recog&&<div className="scan-bar"/>}</>
              :<div style={{textAlign:"center",padding:40,color:"#6b7280"}}>
                <Ic d={I.cam} s={48} c="#374151"/>
                <div style={{fontSize:13,marginTop:10,color:"#9ca3af"}}>Camera feed will appear here</div>
                <div style={{fontSize:11.5,marginTop:5,color:"#6b7280"}}>Click "Start Camera" to begin</div>
              </div>}
          </div>
          <div style={{marginTop:12,padding:"10px 14px",background:"var(--lsky)",borderRadius:9,border:"1px solid var(--lsky2)"}}>
            <p style={{fontSize:12,color:"var(--blue2)",fontWeight:500}}>
              🔒 Only students enrolled in <strong>{cls.name}</strong> will be recognized
            </p>
          </div>
        </div>

        {/* Detection Log */}
        <div className="card" style={{padding:16,display:"flex",flexDirection:"column",maxHeight:520}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,alignItems:"center",flexShrink:0}}>
            <h3 style={{fontSize:13.5,fontWeight:800,color:"var(--navy)"}}>Detection Log</h3>
            <span style={{fontSize:11,color:"var(--text3)",fontWeight:600}}>{detected.length} events</span>
          </div>
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:7}}>
            {detected.length===0
              ?<div style={{textAlign:"center",color:"var(--text3)",padding:"28px 0"}}>
                <Ic d={I.face} s={32} c="var(--border)"/>
                <div style={{fontSize:12,marginTop:8}}>No detections yet</div>
                <div style={{fontSize:11,marginTop:4}}>Start camera and recognition</div>
              </div>
              :detected.map((d,i)=>{
                const bgMap={present:"var(--greenl)",duplicate:"var(--lsky)",unknown:"var(--yellowl)",error:"var(--redl)"};
                const borderMap={present:"var(--greenbr)",duplicate:"var(--lsky2)",unknown:"var(--yellowbr)",error:"var(--redbr)"};
                const colorMap={present:"var(--green)",duplicate:"var(--blue2)",unknown:"var(--yellow)",error:"var(--red)"};
                const emoMap={present:"✅",duplicate:"🔁",unknown:"❓",error:"⚠️"};
                return(
                  <div key={i} style={{padding:"10px 12px",background:bgMap[d.status]||"var(--offwhite)",borderRadius:9,border:"1px solid "+(borderMap[d.status]||"var(--border)"),animation:i===0?"fadeUp .3s both":"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{fontSize:13,fontWeight:700,color:colorMap[d.status]||"var(--text2)"}}>{emoMap[d.status]||"•"} {d.name||"Unknown"}</div>
                      <span style={{fontSize:10.5,fontWeight:700,color:colorMap[d.status],flexShrink:0,marginLeft:6}}>{d.status}</span>
                    </div>
                    {d.confidence!=null&&<div style={{fontSize:12,color:"var(--text2)",marginTop:3}}>Match: <strong>{d.confidence?.toFixed(1)}%</strong>{d.roll&&<span style={{color:"var(--text3)"}}> · {d.roll}</span>}</div>}
                    <div style={{fontSize:10.5,color:"var(--text3)",marginTop:2,fontFamily:"var(--mono)"}}>{d.ts}</div>
                    {d.message&&<div style={{fontSize:11,color:"var(--text3)",marginTop:2,fontStyle:"italic"}}>{d.message}</div>}
                  </div>);})}
          </div>
        </div>
      </div>
    </div>);}

/* ─── ATTENDANCE VIEW ─── */
function AttendanceView({cls,isAdmin}){
  const[records,setRecords]=useState([]); const[ld,setLd]=useState(true); const[dateF,setDateF]=useState("");
  const load=async()=>{
    setLd(true);
    try{const p=dateF?"?date_filter="+dateF:"";setRecords(await api("/attendance/"+cls.id+p));}
    catch(e){toast(e.message,"error");}
    setLd(false);
  };
  useEffect(()=>{load();},[dateF]);
  const exportCSV=()=>{
    const h="Student,Date,Time,Status,Confidence\n";
    const rows=records.map(r=>`${r.student_name||r.student_id},${r.date},${r.time},${r.status},${r.confidence?.toFixed(1)||0}%`).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([h+rows],{type:"text/csv"}));
    a.download=`attendance_${cls.name}_${dateF||"all"}.csv`;a.click();toast("Exported to CSV","success");
  };
  const present=records.filter(r=>r.status==="present").length;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div className="card" style={{padding:15}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <input className="inp" type="date" value={dateF} onChange={e=>setDateF(e.target.value)} style={{width:160}}/>
          <button className="btn bg sm" onClick={()=>setDateF("")}>Clear Filter</button>
          <button className="btn bg sm" onClick={load}><Ic d={I.ref} s={13}/></button>
          {records.length>0&&<div style={{fontSize:12.5,color:"var(--text2)",fontWeight:600,marginLeft:4}}>
            Present: {present} / {records.length}
          </div>}
          <button className="btn bp sm" style={{marginLeft:"auto"}} onClick={exportCSV} disabled={!records.length}><Ic d={I.dl} s={13}/>Export CSV</button>
        </div>
      </div>
      <div className="card" style={{overflow:"hidden"}}>
        <div style={{padding:"13px 18px",borderBottom:"2px solid var(--border)",display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:14,fontWeight:700,color:"var(--navy)"}}>{records.length} Records {!isAdmin&&"(Your attendance only)"}</span>
        </div>
        {ld?<div style={{padding:32,textAlign:"center"}}><Spin s={26}/></div>
        :records.length===0?<div style={{padding:36,textAlign:"center",color:"var(--text3)"}}>No attendance records{dateF?" for "+dateF:" yet"}.</div>
        :<div style={{overflowX:"auto"}}>
          <table>
            <thead><tr><th>Student</th><th>Date</th><th>Time</th><th>Status</th><th>Confidence</th></tr></thead>
            <tbody>{records.map((r,i)=>(
              <tr key={i}>
                <td style={{fontWeight:600}}>{r.student_name||r.student_id}</td>
                <td className="mono" style={{fontSize:12.5}}>{r.date}</td>
                <td className="mono" style={{fontSize:12.5}}>{r.time}</td>
                <td><span className={"bdg "+(r.status==="present"?"bgn":"brd2")}>{r.status==="present"?"✅ Present":"❌ Absent"}</span></td>
                <td>{r.confidence>0?<span style={{fontSize:13,fontWeight:700,color:r.confidence>85?"var(--green)":"var(--yellow)"}}>{r.confidence?.toFixed(1)}%</span>:<span style={{fontSize:12,color:"var(--text3)"}}>Manual</span>}</td>
              </tr>))}</tbody>
          </table>
        </div>}
      </div>
    </div>);}

/* ─── MY ATTENDANCE (per class) ─── */
function MyAttendanceView({cls}){
  const[records,setRecords]=useState([]); const[ld,setLd]=useState(true);
  useEffect(()=>{api("/attendance/"+cls.id).then(setRecords).catch(e=>toast(e.message,"error")).finally(()=>setLd(false));},[]);
  const present=records.filter(r=>r.status==="present").length;
  const pct=records.length?Math.round((present/records.length)*100):0;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12}}>
        {[{l:"Total Classes",v:records.length,c:"var(--blue2)"},{l:"Present",v:present,c:"var(--green)"},{l:"Absent",v:records.length-present,c:"var(--red)"},{l:"Percentage",v:pct+"%",c:pct>=75?"var(--green)":"var(--red)"}].map((s,i)=>(
          <div key={i} className="stat-card">
            <div style={{fontSize:9.5,color:"var(--text3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginBottom:7}}>{s.l}</div>
            <div style={{fontSize:28,fontWeight:900,color:s.c,letterSpacing:"-.02em"}}>{s.v}</div>
          </div>))}
      </div>
      {pct<75&&records.length>0&&<div className="err-box"><Ic d={I.warn} s={15}/>⚠️ Your attendance is below 75%. This may affect your eligibility for exams.</div>}
      <div className="card" style={{overflow:"hidden"}}>
        <div style={{padding:"13px 18px",borderBottom:"2px solid var(--border)"}}><span style={{fontSize:14,fontWeight:700,color:"var(--navy)"}}>Attendance History</span></div>
        {ld?<div style={{padding:28,textAlign:"center"}}><Spin s={24}/></div>
        :records.length===0?<div style={{padding:32,textAlign:"center",color:"var(--text3)"}}>No attendance records yet.</div>
        :<div style={{overflowX:"auto"}}>
          <table>
            <thead><tr><th>Date</th><th>Time</th><th>Status</th></tr></thead>
            <tbody>{records.map((r,i)=>(
              <tr key={i}>
                <td className="mono" style={{fontSize:12.5}}>{r.date}</td>
                <td className="mono" style={{fontSize:12.5,color:"var(--text3)"}}>{r.time}</td>
                <td><span className={"bdg "+(r.status==="present"?"bgn":"brd2")} style={{fontSize:10}}>
                  {r.status==="present"?"✅ Present":"❌ Absent"}
                </span></td>
              </tr>))}</tbody>
          </table>
        </div>}
      </div>
    </div>);}

/* ─── MY ALL ATTENDANCE ─── */
function MyAllAttendance(){
  const[records,setRecords]=useState([]); const[ld,setLd]=useState(true);
  useEffect(()=>{api("/my_attendance").then(setRecords).catch(e=>toast(e.message,"error")).finally(()=>setLd(false));},[]);
  const byCls={};
  records.forEach(r=>{if(!byCls[r.classroom_id])byCls[r.classroom_id]={name:r.classroom_name,subject:r.subject,records:[]};byCls[r.classroom_id].records.push(r);});
  const totalClasses=Object.keys(byCls).length;
  const overallPct=totalClasses?Math.round(records.filter(r=>r.status==="present").length/records.length*100):0;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{background:"linear-gradient(135deg,var(--navy),var(--blue2))",borderRadius:14,padding:"18px 22px",color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div>
          <h3 style={{fontSize:17,fontWeight:800}}>📊 My Attendance</h3>
          <p style={{fontSize:12,color:"rgba(255,255,255,.65)",marginTop:3}}>All classrooms overview</p>
        </div>
        <div style={{display:"flex",gap:16}}>
          {[{l:"Classrooms",v:totalClasses},{l:"Overall",v:overallPct+"%"}].map((s,i)=>(
            <div key={i} style={{textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:900,color:i===1&&overallPct<75?"#FC8181":"#FCD34D",lineHeight:1}}>{s.v}</div>
              <div style={{fontSize:10.5,color:"rgba(255,255,255,.6)",fontWeight:600,textTransform:"uppercase",letterSpacing:".04em",marginTop:3}}>{s.l}</div>
            </div>))}
        </div>
      </div>
      {ld?<div style={{padding:36,textAlign:"center"}}><Spin s={28}/></div>
      :Object.keys(byCls).length===0?<div className="card" style={{padding:44,textAlign:"center",color:"var(--text3)"}}>No attendance records yet.</div>
      :Object.entries(byCls).map(([cid,data])=>{
        const p=data.records.filter(r=>r.status==="present").length;
        const total=data.records.length;
        const pct=total?Math.round((p/total)*100):0;
        return(
          <div key={cid} className="card" style={{overflow:"hidden"}}>
            <div style={{padding:"14px 18px",borderBottom:"2px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{fontSize:14.5,fontWeight:800,color:"var(--navy)"}}>{data.name}</div>
                <div style={{fontSize:11.5,color:"var(--text3)",marginTop:1}}>{data.subject}</div>
              </div>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <div style={{width:90,height:7,background:"var(--border)",borderRadius:4,overflow:"hidden"}}>
                  <div style={{width:pct+"%",height:"100%",background:pct>=75?"var(--green)":"var(--red)",borderRadius:4,transition:"width .5s"}}/>
                </div>
                <span style={{fontSize:14,fontWeight:800,color:pct>=75?"var(--green)":"var(--red)",minWidth:38,textAlign:"right"}}>{pct}%</span>
                <span className={"bdg "+(pct>=75?"bgn":"brd2")} style={{fontSize:10}}>{p}/{total}</span>
              </div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr><th>Date & Time</th><th>Status</th></tr></thead>
                <tbody>{data.records.slice(0,10).map((r,i)=>(
                  <tr key={i}>
                    <td className="mono" style={{fontSize:12}}>{r.date} · {r.time}</td>
                    <td><span className={"bdg "+(r.status==="present"?"bgn":"brd2")} style={{fontSize:10}}>{r.status==="present"?"✅":"❌"} {r.status}</span></td>
                  </tr>))}</tbody>
              </table>
              {data.records.length>10&&<div style={{padding:"8px 18px",fontSize:12,color:"var(--text3)",fontStyle:"italic"}}>... and {data.records.length-10} more records</div>}
            </div>
          </div>);})}
    </div>);}

/* ═══════════════════════════════════════
   MAIN APP
═══════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(null);
  const[boot,setBoot]=useState(true);
  const[av,setAv]=useState("dash");
  const[col,setCol]=useState(false);
  const[activeCls,setActiveCls]=useState(null);
  const[notifCount,setNotifCount]=useState(0);

  const loadMe=async()=>{
    if(!getToken()){setBoot(false);return;}
    try{setUser(await api("/me"));}catch{clearToken();}
    setBoot(false);
  };
  const loadNotifCount=useCallback(async()=>{
    if(!getToken())return;
    try{const n=await api("/notifications");setNotifCount(n.filter(x=>!x.read).length);}catch{}
  },[]);

  useEffect(()=>{loadMe();},[]);
  useEffect(()=>{
    if(user){loadNotifCount();const t=setInterval(loadNotifCount,30000);return()=>clearInterval(t);}
  },[user]);
  useEffect(()=>{if(av==="notifs"){loadNotifCount();}},[av]);

  const logout=()=>{clearToken();setUser(null);setAv("dash");setActiveCls(null);toast("Logged out successfully","info");};
  const onAuth=()=>{setBoot(true);loadMe();};
  const navSetAv=v=>{setAv(v);if(v!=="classroom")setActiveCls(null);};

  if(boot) return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:18,background:"linear-gradient(135deg,var(--navy),var(--blue2))"}}>
      <div style={{width:64,height:64,background:"#fff",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:900,color:"var(--navy)",boxShadow:"0 8px 24px rgba(0,0,0,.3)"}}>N</div>
      <Spin s={32} c="rgba(255,255,255,.8)"/>
      <div style={{fontSize:13,color:"rgba(255,255,255,.6)",fontWeight:500,letterSpacing:".04em"}}>Loading NITJ Classroom...</div>
    </div>);

  if(!user) return <><AuthPage onAuth={onAuth}/><Toasts/></>;

  const sw=col?64:236;
  const titles={dash:"Dashboard",classrooms:"My Classrooms",myassign:"All Assignments",myattend:"My Attendance",notifs:"Notifications",classroom:"Classroom"};

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <Sidebar av={av} setAv={navSetAv} user={user} onLogout={logout} col={col} setCol={setCol} notifCount={notifCount}/>
      <div style={{marginLeft:sw,transition:"margin-left .28s cubic-bezier(.4,0,.2,1)",minHeight:"100vh"}}>
        <Topbar title={titles[av]||av} user={user} sw={sw}/>
        <main style={{padding:"78px 24px 24px",maxWidth:1300}}>
          {av==="classroom"&&activeCls
            ?<ClassroomPage cls={activeCls} user={user} goBack={()=>{setActiveCls(null);setAv("classrooms");}}/>
            :av==="myattend"?<MyAllAttendance/>
            :av==="myassign"?<MyAssignmentsAll/>
            :av==="notifs"?<NotificationsPage/>
            :<Dashboard user={user} setAv={navSetAv} setActiveCls={setActiveCls}/>}
        </main>
      </div>
      <Toasts/>
    </div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
