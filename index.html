<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NITJ Attendance Management System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080d1a;--bg2:#0d1325;--bg3:#111827;
  --glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --blue:#3b82f6;--indigo:#6366f1;--gold:#f59e0b;--green:#10b981;
  --red:#ef4444;--purple:#8b5cf6;--cyan:#06b6d4;
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;
}
html,body,#root{min-height:100vh;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Syne',sans-serif;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes scanLine{0%{top:-2px}100%{top:100%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fade-up{animation:fadeUp .4s ease-out both;}
.d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}.d4{animation-delay:.32s}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .2s;white-space:nowrap;}
.btn:disabled{opacity:.55;cursor:not-allowed;}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--indigo));color:white;}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 25px rgba(99,102,241,.4);}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;}
.btn-ghost{background:var(--glass);color:var(--t2);border:1px solid var(--border);}
.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.08);color:var(--t1);}
.btn-success{background:linear-gradient(135deg,var(--green),#059669);color:white;}
.btn-warn{background:linear-gradient(135deg,var(--gold),#d97706);color:white;}
.btn-sm{padding:7px 14px;font-size:13px;}
.card{background:rgba(13,19,37,.75);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(10px);}
.input{width:100%;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.input:focus{border-color:var(--blue);}
.input::placeholder{color:var(--t3);}
select.input option{background:#0d1325;color:var(--t1);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-green{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3);}
.badge-red{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3);}
.badge-yellow{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3);}
.badge-blue{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.3);}
.badge-purple{background:rgba(139,92,246,.15);color:#8b5cf6;border:1px solid rgba(139,92,246,.3);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);border-bottom:1px solid var(--border);}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.sl{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--t2);font-size:14px;font-weight:500;user-select:none;}
.sl:hover,.sl.act{background:rgba(59,130,246,.12);color:var(--blue);}
.sl.act{background:rgba(59,130,246,.15);}
.toast-cont{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast-item{padding:13px 18px;border-radius:12px;font-size:13px;font-weight:500;animation:fadeUp .3s ease-out;display:flex;align-items:center;gap:10px;min-width:260px;max-width:360px;}
.t-success{background:#0c2d22;border:1px solid rgba(16,185,129,.5);color:#6ee7b7;}
.t-error{background:#2d0c0c;border:1px solid rgba(239,68,68,.5);color:#fca5a5;}
.t-info{background:#0c1e40;border:1px solid rgba(59,130,246,.5);color:#93c5fd;}
.t-warn{background:#2d1f0c;border:1px solid rgba(245,158,11,.5);color:#fde68a;}
.cam-box{width:100%;aspect-ratio:16/9;background:#050810;border-radius:12px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);}
.scan-line{position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,#3b82f6,transparent);animation:scanLine 2s linear infinite;pointer-events:none;z-index:2;}
.face-box{border:2px solid var(--green);border-radius:6px;position:absolute;animation:glow 1.5s infinite;z-index:3;}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
.stat-num{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;}
.offline-banner{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:10px 16px;font-size:12px;color:#fca5a5;display:flex;align-items:center;gap:8px;}
</style>
</head>

// ── Toast system ───────────────────────────────────────────────────────────────
let _toastSet=null;
let _tid=0;
let _toasts=[];
function toast(msg,type="info"){
  const id=++_tid;
  _toasts=[..._toasts,{id,msg,type}];
  if(_toastSet)_toastSet([..._toasts]);
  setTimeout(()=>{_toasts=_toasts.filter(t=>t.id!==id);if(_toastSet)_toastSet([..._toasts]);},5000);
}

function Toasts(){
  const[ts,setTs]=useState([]);
  useEffect(()=>{_toastSet=setTs;},[]);
  const icons={success:"✅",error:"❌",info:"ℹ️",warn:"⚠️"};
  return <div className="toast-cont">{ts.map(t=><div key={t.id} className={`toast-item t-${t.type}`}>{icons[t.type]||"ℹ️"} {t.msg}</div>)}</div>;
}

function Spin({s=18,c="var(--blue)"}){
  return <div style={{width:s,height:s,border:`2px solid rgba(255,255,255,.15)`,borderTopColor:c,borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block",flexShrink:0}}/>;
}

// ── API helpers ────────────────────────────────────────────────────────────────
async function apiFetch(path,opts={}){
  const res = await fetch(`${API}${path}`,{
    headers:{"Content-Type":"application/json",...(opts.headers||{})},
    ...opts
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({detail:"Unknown error"}));
    throw new Error(err.detail||"Request failed");
  }
  return res.json();
}

function captureFrame(videoEl){
  const canvas = document.createElement("canvas");
  canvas.width  = videoEl.videoWidth  || 640;
  canvas.height = videoEl.videoHeight || 480;
  canvas.getContext("2d").drawImage(videoEl,0,0);
  return canvas.toDataURL("image/jpeg",0.85);
}

function RegisterStudent(){
  const[form,setForm]=useState({name:"",roll:"",branch:"CSE",year:1,section:"A",email:""});
  const[camOn,setCamOn]=useState(false);
  const[stream,setStream]=useState(null);
  const[preview,setPreview]=useState(null);
  const[loading,setLoading]=useState(false);
  const[captureMsg,setCaptureMsg]=useState("");
  const vidRef=useRef(null);
  const canvRef=useRef(null);

  const startCam=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:"user"}});
      setStream(s);setCamOn(true);
      setTimeout(()=>{if(vidRef.current)vidRef.current.srcObject=s;},100);
      toast("Camera ready — position your face and capture","info");
    }catch(e){toast("Camera access denied or unavailable","error");}
  };

  const stopCam=()=>{
    stream?.getTracks().forEach(t=>t.stop());
    setStream(null);setCamOn(false);setPreview(null);
  };

  useEffect(()=>()=>stopCam(),[]);

  const capture=()=>{
    if(!vidRef.current)return;
    const dataUrl=captureFrame(vidRef.current);
    setPreview(dataUrl);
    setCaptureMsg("Photo captured! Click Register to save.");
    toast("Face captured","success");
  };

  const register=async()=>{
    if(!form.name||!form.roll){toast("Name and Roll Number are required","error");return;}
    if(!preview){toast("Please capture a face photo first","error");return;}
    setLoading(true);
    try{
      const res=await apiFetch("/register_student",{
        method:"POST",
        body:JSON.stringify({...form,year:parseInt(form.year),image:preview})
      });
      toast(res.message,"success");
      setForm({name:"",roll:"",branch:"CSE",year:1,section:"A",email:""});
      setPreview(null);setCaptureMsg("");
      stopCam();
    }catch(e){toast(e.message,"error");}
    setLoading(false);

  return (

      <div className="card fade-up" style={{padding:24}}>

        {/* Form */}
        <div className="card fade-up d1" style={{padding:22,display:"flex",flexDirection:"column",gap:14}}>
          <h3 style={{fontSize:14,fontWeight:700}}>Student Details</h3>
          {[
            {k:"name",l:"Full Name",t:"text",ph:"e.g. Arjun Sharma"},
            {k:"roll",l:"Roll Number",t:"text",ph:"e.g. 21CSE001"},
            {k:"email",l:"Email (optional)",t:"email",ph:"student@nitj.ac.in"},
          ].map(f=>(
            <div key={f.k}>
              <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em"}}>{f.l}</label>
              <input className="input" type={f.t} placeholder={f.ph} value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))}/>
            </div>
          ))}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <div>
              <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em"}}>Branch</label>
              <select className="input" value={form.branch} onChange={e=>setForm(p=>({...p,branch:e.target.value}))}>
                {BRANCHES.map(b=><option key={b.id} value={b.id}>{b.id}</option>)}

            <div>
              <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em"}}>Year</label>
              <select className="input" value={form.year} onChange={e=>setForm(p=>({...p,year:parseInt(e.target.value)}))}>
                {[1,2,3,4].map(y=><option key={y} value={y}>Year {y}</option>)}

// ── Attendance Taker (real recognition) ───────────────────────────────────────
function AttendanceTaker({teacher}){
  const[branch,setBranch]=useState("CSE");
  const[year,setYear]=useState(3);
  const[section,setSection]=useState("A");
  const[subject,setSubject]=useState("");
  const[camOn,setCamOn]=useState(false);
  const[recog,setRecog]=useState(false);
  const[detected,setDetected]=useState([]);
  const[stream,setStream]=useState(null);
  const[backendOk,setBackendOk]=useState(true);
  const vidRef=useRef(null);
  const intRef=useRef(null);

  const startCam=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
      setStream(s);setCamOn(true);
      setTimeout(()=>{if(vidRef.current)vidRef.current.srcObject=s;},100);
      toast("Camera started","success");
    }catch(e){toast("Camera access denied","error");}
  };

  const stopCam=()=>{
    stream?.getTracks().forEach(t=>t.stop());
    setStream(null);setCamOn(false);setRecog(false);
    if(intRef.current)clearInterval(intRef.current);
  };

  const startRecog=()=>{
    setRecog(true);
    toast("Face recognition started — scanning every 3 seconds","info");
    intRef.current=setInterval(async()=>{
      if(!vidRef.current||!vidRef.current.readyState>=2)return;
      const frame=captureFrame(vidRef.current);
      try{
        const res=await apiFetch("/recognize",{
          method:"POST",
          body:JSON.stringify({image:frame,subject})
        });
        setBackendOk(true);
        if(res.status==="no_face")return;
        const results=res.results||[];
        for(const r of results){
          const entry={...r,ts:new Date().toLocaleTimeString()};
          setDetected(prev=>[entry,...prev].slice(0,30));
          if(r.status==="present")toast(`✅ ${r.name} marked present (${r.confidence}%)`,"success");
          else if(r.status==="duplicate")toast(`🔁 ${r.name} already marked today`,"info");
          else if(r.status==="unknown")toast("❓ Unknown face detected","warn");
        }
      }catch(e){
        setBackendOk(false);
        toast("Backend offline — recognition paused","error");
        setRecog(false);clearInterval(intRef.current);
      }
    },3000);
  };

  const stopRecog=()=>{
    setRecog(false);
    if(intRef.current)clearInterval(intRef.current);
    toast("Recognition paused","info");
  };

  useEffect(()=>()=>{stopCam();},[]);

  const presentCount=detected.filter(d=>d.status==="present").length;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div className="card fade-up" style={{padding:20}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Session Configuration</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12}}>
          {[
            {label:"Branch",el:<select className="input" value={branch} onChange={e=>setBranch(e.target.value)}>{BRANCHES.map(b=><option key={b.id} value={b.id}>{b.id}</option>)}</select>},
            {label:"Year",el:<select className="input" value={year} onChange={e=>setYear(Number(e.target.value))}>{[1,2,3,4].map(y=><option key={y} value={y}>Year {y}</option>)}</select>},
            {label:"Section",el:<select className="input" value={section} onChange={e=>setSection(e.target.value)}>{["A","B","C"].map(s=><option key={s} value={s}>Sec {s}</option>)}</select>},
            {label:"Subject",el:<input className="input" placeholder="e.g. Data Structures" value={subject} onChange={e=>setSubject(e.target.value)}/>},
          ].map(f=>(
            <div key={f.label}>
              <label style={{fontSize:10,color:"var(--t3)",display:"block",marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>{f.label}</label>
              {f.el}
            </div>
          ))}
        </div>
        <div style={{marginTop:14,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {!camOn?<button className="btn btn-primary btn-sm" onClick={startCam}><Ic p={P.cam} s={15}/> Start Camera</button>
            :<button className="btn btn-danger btn-sm" onClick={stopCam}><Ic p={P.x} s={15}/> Stop Camera</button>}
          {camOn&&!recog&&<button className="btn btn-success btn-sm" onClick={startRecog}><Ic p={P.face} s={15}/> Start Recognition</button>}
          {recog&&<button className="btn btn-ghost btn-sm" onClick={stopRecog}><Ic p={P.x} s={15}/> Pause</button>}
          {!backendOk&&<span className="badge badge-red"><Ic p={P.warn} s={11}/> Backend offline</span>}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:16}}>
        <div className="card" style={{padding:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h3 style={{fontSize:14,fontWeight:700}}>Live Camera Feed</h3>
            <div style={{display:"flex",gap:6}}>
              {recog&&<span className="badge badge-green"><span style={{display:"inline-block",width:5,height:5,background:"var(--green)",borderRadius:"50%",animation:"pulse 1.5s infinite",marginRight:3}}/>LIVE</span>}
              {presentCount>0&&<span className="badge badge-blue">{presentCount} present</span>}
            </div>
          </div>
          <div className="cam-box" style={{aspectRatio:"16/9",borderColor:camOn?"rgba(16,185,129,.3)":"var(--border)"}}>
            {camOn?(
              <>
                <video ref={vidRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                {recog&&<div className="scan-line"/>}
              </>
            ):(
              <div style={{textAlign:"center",color:"var(--t3)"}}>
                <div style={{fontSize:48,marginBottom:10,opacity:.2}}>📷</div>
                <div style={{fontSize:13}}>Camera not active</div>
                <div style={{fontSize:11,marginTop:4}}>Click "Start Camera" above</div>
              </div>
            )}
          </div>
          <p style={{fontSize:11,color:"var(--t3)",marginTop:10}}>Frames captured every 3 seconds → FastAPI /recognize → face_recognition library</p>
        </div>

        <div className="card" style={{padding:18,display:"flex",flexDirection:"column",maxHeight:500}}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:14,flexShrink:0}}>Live Detection Log</h3>
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:7}}>
            {detected.length===0?(
              <div style={{textAlign:"center",color:"var(--t3)",padding:"30px 0"}}>
                <div style={{fontSize:36,opacity:.2}}>🔍</div>
                <div style={{fontSize:12,marginTop:8}}>No detections yet</div>
                <div style={{fontSize:11,marginTop:4}}>Start camera & recognition</div>
              </div>
            ):detected.map((d,i)=>(
              <div key={i} style={{padding:"9px 11px",background:"var(--glass)",borderRadius:9,border:`1px solid ${d.status==="present"?"rgba(16,185,129,.2)":d.status==="duplicate"?"rgba(139,92,246,.2)":d.status==="unknown"?"rgba(245,158,11,.2)":"rgba(239,68,68,.2)"}`,animation:i===0?"fadeUp .3s ease-out":"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,marginBottom:1}}>{d.name||"Unknown"}</div>
                    <div style={{fontSize:10,color:"var(--t3)"}}>{d.roll||"—"} {d.branch?`• ${d.branch}`:""}</div>
                  </div>
                  <span className={`badge ${d.status==="present"?"badge-green":d.status==="duplicate"?"badge-purple":d.status==="unknown"?"badge-yellow":"badge-red"}`} style={{fontSize:9}}>
                    {d.status==="present"?"✅ Present":d.status==="duplicate"?"🔁 Duplicate":d.status==="unknown"?"❓ Unknown":"⚠️ Error"}
                  </span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
                  <span style={{fontSize:10,color:"var(--t3)"}}>{d.ts}</span>
                  {d.confidence!=null&&<span style={{fontSize:10,color:d.confidence>85?"var(--green)":d.confidence>70?"var(--gold)":"var(--red)"}}>{d.confidence?.toFixed(1)}% match</span>}
                </div>
                {d.message&&<div style={{fontSize:10,color:"var(--t3)",marginTop:3}}>{d.message}</div>}
              </div>
            ))}
          </div>
          {detected.length>0&&<button className="btn btn-ghost btn-sm" style={{marginTop:10,flexShrink:0}} onClick={()=>setDetected([])}><Ic p={P.trash} s={13}/> Clear Log</button>}
        </div>
      </div>
    </div>
  );
}

// ── Branches ───────────────────────────────────────────────────────────────────
function BranchesView({onSelect}){

  return (
    <div>
      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:19,fontWeight:700,marginBottom:4}}>Academic Branches</h2>
        <p style={{color:"var(--t2)",fontSize:13}}>Select a branch to manage attendance</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:14}}>
        {BRANCHES.map((b,i)=>(
          <div key={b.id} className="card fade-up" style={{padding:22,cursor:"pointer",transition:"all .2s",animationDelay:`${i*.05}s`,position:"relative",overflow:"hidden",transform:hover===b.id?"translateY(-3px)":"none",borderColor:hover===b.id?`${b.color}55`:"var(--border)"}}
            onClick={()=>onSelect(b)} onMouseEnter={()=>setHover(b.id)} onMouseLeave={()=>setHover(null)}>

}

// ── Students (from backend) ────────────────────────────────────────────────────
function StudentsView(){
  const[students,setStudents]=useState([]);
  const[loading,setLoading]=useState(true);
  const[offline,setOffline]=useState(false);
  const[branch,setBranch]=useState("");
  const[year,setYear]=useState("");
  const[search,setSearch]=useState("");

  const load=async()=>{
    setLoading(true);setOffline(false);
    try{
      const params=new URLSearchParams();
      if(branch)params.append("branch",branch);
      if(year)params.append("year",year);
      const data=await apiFetch(`/students?${params}`);
      setStudents(data);
    }catch(e){setOffline(true);}
    setLoading(false);
  };

  useEffect(()=>{load();},[branch,year]);

  const filtered=students.filter(s=>
    !search||s.name.toLowerCase().includes(search.toLowerCase())||s.roll.toLowerCase().includes(search.toLowerCase())
  );

  const del=async(roll,name)=>{
    if(!confirm(`Delete ${name}? This also removes their face data.`))return;
    try{
      await apiFetch(`/students/${roll}`,{method:"DELETE"});
      toast(`${name} deleted`,"success");
      load();
    }catch(e){toast(e.message,"error");}
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div className="card fade-up" style={{padding:18}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{position:"relative",flex:1,minWidth:180}}>
            <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"var(--t3)",display:"flex"}}><Ic p={P.srch} s={15}/></div>
            <input className="input" placeholder="Search name or roll…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:36}}/>
          </div>
          <select className="input" value={branch} onChange={e=>setBranch(e.target.value)} style={{width:130}}>
            <option value="">All Branches</option>{BRANCHES.map(b=><option key={b.id} value={b.id}>{b.id}</option>)}
          </select>
          <select className="input" value={year} onChange={e=>setYear(e.target.value)} style={{width:110}}>
            <option value="">All Years</option>{[1,2,3,4].map(y=><option key={y} value={y}>Year {y}</option>)}
          </select>
          <button className="btn btn-ghost btn-sm" onClick={load}><Ic p={P.refresh} s={14}/></button>
        </div>
      </div>

      {offline&&<div className="offline-banner"><Ic p={P.warn} s={15}/> Cannot reach backend. Students loaded from local state only.</div>}

      <div className="card fade-up" style={{overflow:"hidden"}}>
        <div style={{padding:"14px 18px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,color:"var(--t2)"}}>{filtered.length} students</span>
        </div>
        {loading?<div style={{padding:40,textAlign:"center"}}><Spin s={28}/></div>:filtered.length===0?(
          <div style={{padding:40,textAlign:"center",color:"var(--t3)"}}>
            <div style={{fontSize:36,opacity:.2}}>👥</div>
            <div style={{fontSize:13,marginTop:10}}>No students found</div>
            <div style={{fontSize:11,marginTop:4}}>Register students using the sidebar</div>
          </div>
        ):(
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>Student</th><th>Roll Number</th><th>Branch</th><th>Year / Section</th><th>Face Data</th><th>Actions</th></tr></thead>
              <tbody>
                {filtered.map(s=>(
                  <tr key={s.id}>
                    <td>
                      <div style={{display:"flex",alignItems:"center",gap:9}}>
                        <div style={{width:32,height:32,background:"linear-gradient(135deg,#1e3a8a,#312e81)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0}}>{s.name[0]}</div>
                        <div>
                          <div style={{fontWeight:500}}>{s.name}</div>
                          {s.email&&<div style={{fontSize:10,color:"var(--t3)"}}>{s.email}</div>}
                        </div>
                      </div>
                    </td>
                    <td style={{fontFamily:"monospace",fontSize:12}}>{s.roll}</td>
                    <td><span className="badge badge-blue">{s.branch}</span></td>
                    <td style={{color:"var(--t2)"}}>Year {s.year} / Sec {s.section}</td>
                    <td><span className={`badge ${s.face_enrolled?"badge-green":"badge-yellow"}`}>{s.face_enrolled?"✅ Enrolled":"⚠️ Pending"}</span></td>
                    <td>
                      <button className="btn btn-ghost btn-sm" style={{color:"var(--red)"}} onClick={()=>del(s.roll,s.name)}><Ic p={P.trash} s={13}/></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Records (from backend) ─────────────────────────────────────────────────────
function RecordsView(){
  const[records,setRecords]=useState([]);
  const[loading,setLoading]=useState(true);
  const[offline,setOffline]=useState(false);
  const[dateF,setDateF]=useState("");
  const[branchF,setBranchF]=useState("");

  const load=async()=>{
    setLoading(true);setOffline(false);
    try{
      const params=new URLSearchParams();
      if(dateF)params.append("date_filter",dateF);
      if(branchF)params.append("branch",branchF);
      const data=await apiFetch(`/attendance?${params}`);
      setRecords(data);
    }catch(e){setOffline(true);}
    setLoading(false);
  };

  useEffect(()=>{load();},[dateF,branchF]);

  const exportCSV=()=>{
    const header="Name,Roll,Branch,Year,Section,Date,Time,Confidence,Subject\n";
    const rows=records.map(r=>`${r.name},${r.roll},${r.branch},${r.year},${r.section},${r.date},${r.time},${r.confidence?.toFixed(1)}%,${r.subject||""}`).join("\n");
    const blob=new Blob([header+rows],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`attendance_${dateF||"all"}.csv`;a.click();
    toast("CSV exported","success");
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div className="card fade-up" style={{padding:18}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <input className="input" type="date" value={dateF} onChange={e=>setDateF(e.target.value)} style={{width:155}}/>
          <select className="input" value={branchF} onChange={e=>setBranchF(e.target.value)} style={{width:130}}>
            <option value="">All Branches</option>{BRANCHES.map(b=><option key={b.id} value={b.id}>{b.id}</option>)}
          </select>
          <button className="btn btn-ghost btn-sm" onClick={()=>{setDateF("");setBranchF("");}}>Clear</button>
          <button className="btn btn-ghost btn-sm" onClick={load}><Ic p={P.refresh} s={14}/></button>
          <button className="btn btn-primary btn-sm" style={{marginLeft:"auto"}} onClick={exportCSV} disabled={records.length===0}><Ic p={P.dl} s={14}/> Export CSV</button>
        </div>
      </div>

      {offline&&<div className="offline-banner"><Ic p={P.warn} s={15}/> Backend offline — cannot load records.</div>}

      <div className="card fade-up" style={{overflow:"hidden"}}>
        <div style={{padding:"14px 18px",borderBottom:"1px solid var(--border)"}}><span style={{fontSize:13,color:"var(--t2)"}}>{records.length} records</span></div>
        {loading?<div style={{padding:40,textAlign:"center"}}><Spin s={28}/></div>:records.length===0?(
          <div style={{padding:40,textAlign:"center",color:"var(--t3)"}}>
            <div style={{fontSize:36,opacity:.2}}>📊</div>
            <div style={{fontSize:13,marginTop:10}}>No records found</div>
          </div>
        ):(
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>Student</th><th>Roll</th><th>Branch</th><th>Date</th><th>Time</th><th>Subject</th><th>Confidence</th></tr></thead>
              <tbody>
                {records.map((r,i)=>(
                  <tr key={i}>
                    <td style={{fontWeight:500}}>{r.name}</td>
                    <td style={{fontFamily:"monospace",fontSize:12}}>{r.roll}</td>
                    <td><span className="badge badge-blue">{r.branch}</span></td>
                    <td style={{color:"var(--t2)",fontSize:12}}>{r.date}</td>
                    <td style={{color:"var(--t2)",fontSize:12}}>{r.time}</td>
                    <td style={{color:"var(--t3)",fontSize:12}}>{r.subject||"—"}</td>
                    <td>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{width:44,height:4,background:"var(--border)",borderRadius:2,overflow:"hidden"}}>
                          <div style={{width:`${r.confidence}%`,height:"100%",background:r.confidence>90?"var(--green)":r.confidence>80?"var(--gold)":"var(--red)",borderRadius:2}}/>
                        </div>
                        <span style={{fontSize:11,color:"var(--t3)"}}>{r.confidence?.toFixed(1)}%</span>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Reports (from backend) ─────────────────────────────────────────────────────
function ReportsView(){
  const[stats,setStats]=useState(null);
  const[records,setRecords]=useState([]);
  const[students,setStudents]=useState([]);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try{
        const[s,r,st]=await Promise.all([apiFetch("/stats"),apiFetch("/attendance"),apiFetch("/students")]);
        setStats(s);setRecords(r);setStudents(st);
      }catch(e){toast("Backend offline","error");}
      setLoading(false);
    })();
  },[]);

  // compute per-student summary
  const summary=students.map(s=>{
    const attended=records.filter(r=>r.roll===s.roll).length;
    return {...s,attended,pct:records.length?Math.round(attended/Math.max(1,new Set(records.map(r=>r.date)).size)*100):0};
  }).sort((a,b)=>a.pct-b.pct);

  const exportFullCSV=()=>{
    const header="Name,Roll,Branch,Attended,Total Classes,Percentage\n";
    const rows=summary.map(s=>`${s.name},${s.roll},${s.branch},${s.attended},${new Set(records.map(r=>r.date)).size},${s.pct}%`).join("\n");
    const blob=new Blob([header+rows],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="attendance_report.csv";a.click();
    toast("Full report exported","success");
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      {loading?<div style={{padding:60,textAlign:"center"}}><Spin s={32}/></div>:(
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14}}>
            {[
              {l:"Total Students",v:stats?.total_students??0,c:"#3b82f6"},
              {l:"Today Present",v:stats?.today_present??0,c:"#10b981"},
              {l:"Face Enrolled",v:stats?.face_enrolled??0,c:"#6366f1"},
              {l:"Total Records",v:stats?.total_records??0,c:"#8b5cf6"},
            ].map((s,i)=>(
              <div key={i} className="card fade-up" style={{padding:18}}>
                <div style={{fontSize:10,color:"var(--t3)",marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>{s.l}</div>
                <div style={{fontSize:26,fontWeight:800,fontFamily:"Syne",color:s.c}}>{s.v}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <button className="btn btn-primary btn-sm" onClick={exportFullCSV}><Ic p={P.dl} s={14}/> Export Full Report</button>
          </div>
          <div className="card fade-up" style={{overflow:"hidden"}}>
            <div style={{padding:"14px 18px",borderBottom:"1px solid var(--border)"}}><h3 style={{fontSize:14,fontWeight:700}}>Student Attendance Summary</h3></div>
            {summary.length===0?(
              <div style={{padding:40,textAlign:"center",color:"var(--t3)"}}>No students registered yet.</div>
            ):(
              <div style={{overflowX:"auto"}}>
                <table>
                  <thead><tr><th>Student</th><th>Roll</th><th>Branch</th><th>Attended</th><th>Face</th><th>Percentage</th><th>Status</th></tr></thead>
                  <tbody>
                    {summary.map((s,i)=>(
                      <tr key={i}>
                        <td style={{fontWeight:500}}>{s.name}</td>
                        <td style={{fontFamily:"monospace",fontSize:12}}>{s.roll}</td>
                        <td><span className="badge badge-blue">{s.branch}</span></td>
                        <td>{s.attended}</td>
                        <td><span className={`badge ${s.face_enrolled?"badge-green":"badge-yellow"}`}>{s.face_enrolled?"✅":"⚠️"}</span></td>
                        <td>
                          <div style={{display:"flex",alignItems:"center",gap:7}}>
                            <div style={{width:52,height:5,background:"var(--border)",borderRadius:3,overflow:"hidden"}}>
                              <div style={{width:`${Math.min(s.pct,100)}%`,height:"100%",background:s.pct>=75?"var(--green)":"var(--red)",borderRadius:3}}/>
                            </div>
                            <span style={{fontSize:12,fontWeight:700,color:s.pct>=75?"var(--green)":"var(--red)"}}>{s.pct}%</span>
                          </div>
                        </td>
                        <td><span className={`badge ${s.pct>=75?"badge-green":"badge-red"}`}>{s.pct>=75?"✅ Regular":"⚠️ Shortage"}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </>
      )}
    </div>
  );
}

// ── Admin Panel ────────────────────────────────────────────────────────────────
function AdminPanel(){
  const[stats,setStats]=useState(null);
  useEffect(()=>{apiFetch("/stats").then(setStats).catch(()=>{});}, []);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:14}}>
        {[
          {l:"Total Students",v:stats?.total_students??"…",c:"#3b82f6"},
          {l:"Face Enrolled",v:stats?.face_enrolled??"…",c:"#10b981"},
          {l:"Today Present",v:stats?.today_present??"…",c:"#f59e0b"},
          {l:"Total Records",v:stats?.total_records??"…",c:"#8b5cf6"},
        ].map((s,i)=>(
          <div key={i} className="card" style={{padding:18}}>
            <div style={{fontSize:10,color:"var(--t3)",marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>{s.l}</div>
            <div style={{fontSize:26,fontWeight:800,fontFamily:"Syne",color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>
      <div className="card fade-up" style={{padding:22}}>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>System Information</h3>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {[
            {l:"Backend",v:`${API}`},
            {l:"Database",v:"attendance.db (SQLite)"},
            {l:"Face Store",v:"faces.pkl (pickle)"},
            {l:"Recognition",v:"face_recognition + dlib"},
            {l:"API Framework",v:"FastAPI + Uvicorn"},
          ].map(r=>(
            <div key={r.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"var(--glass)",borderRadius:8,border:"1px solid var(--border)"}}>
              <span style={{fontSize:12,color:"var(--t3)"}}>{r.l}</span>
              <span style={{fontSize:12,fontFamily:"monospace",color:"var(--t2)"}}>{r.v}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="card fade-up" style={{padding:22}}>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Quick Setup Guide</h3>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[
            "pip install fastapi uvicorn python-multipart face_recognition pillow numpy",
            "uvicorn main:app --reload --host 0.0.0.0 --port 8000",
            "Register students via 'Register Student' in sidebar",
            "Start camera + recognition in 'Take Attendance'",
          ].map((step,i)=>(
            <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 12px",background:"var(--glass)",borderRadius:8}}>
              <span style={{width:20,height:20,background:"rgba(59,130,246,.2)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"var(--blue)",flexShrink:0}}>{i+1}</span>
              <code style={{fontSize:11,color:"var(--t2)",fontFamily:"monospace",lineHeight:1.6}}>{step}</code>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────────
function App(){
  const[teacher,setTeacher]=useState(()=>{
    try{return JSON.parse(sessionStorage.getItem("nitj_teacher"));}catch{return null;}
  });
  const[av,setAv]=useState("dashboard");
  const[col,setCol]=useState(false);

  const logout=()=>{sessionStorage.removeItem("nitj_teacher");setTeacher(null);};
  const login=(t)=>{sessionStorage.setItem("nitj_teacher",JSON.stringify(t));setTeacher(t);};

  if(!teacher)return <><Login onLogin={login}/><Toasts/></>;

  const sw=col?68:238;
  const titles={
    dashboard:"Dashboard",attendance:"Take Attendance",register:"Register Student",
    branches:"Branches",students:"Students",records:"Attendance Records",
    reports:"Reports & Analytics",admin:"Admin Panel"
  };

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <div className="grid-bg"/>
      <Sidebar av={av} setAv={setAv} teacher={teacher} onLogout={logout} col={col} setCol={setCol}/>
      <div style={{marginLeft:sw,transition:"margin-left .25s",minHeight:"100vh"}}>
        <Topbar title={titles[av]||av} teacher={teacher} sw={sw}/>
        <main style={{padding:"82px 24px 24px",maxWidth:1380}}>
          {av==="dashboard"&&<Dashboard teacher={teacher} setAv={setAv}/>}
          {av==="attendance"&&<AttendanceTaker teacher={teacher}/>}
          {av==="register"&&<RegisterStudent/>}
          {av==="branches"&&<BranchesView onSelect={b=>{toast(`Opening ${b.name}...`,"info");setAv("attendance");}}/>}
          {av==="students"&&<StudentsView/>}
          {av==="records"&&<RecordsView/>}
          {av==="reports"&&<ReportsView/>}
          {av==="admin"&&teacher?.is_admin&&<AdminPanel/>}
        </main>
      </div>
      <Toasts/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
