
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NITJ Classroom</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
/* ... (Aapki CSS yahan same rahegi) ... */
*{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif;}
:root{
  --navy:#0D2137;--blue:#1565C0;--lblue:#1976D2;--sky:#42A5F5;--lsky:#E3F2FD;--dsky:#1E88E5;
  --white:#fff;--bg:#F0F4F8;--card:#fff;--offwhite:#F8FAFF;
  --text:#1A2B42;--t2:#4A6080;--t3:#8A9BB0;
  --border:#D0DCE8;--shadow:rgba(21,101,192,0.10);
  --green:#2E7D32;--greenl:#E8F5E9;--greenb:#C8E6C9;
  --red:#C62828;--redl:#FFEBEE;--redb:#FFCDD2;
  --yellow:#E65100;--yellowl:#FFF3E0;--yellowb:#FFE0B2;
  --purple:#6A1B9A;--purplel:#F3E5F5;
}

body{background:var(--bg);color:var(--text);min-height:100vh;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes scan{0%{top:-2px}100%{top:100%}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fu{animation:fadeUp .3s ease-out both;}
.d1{animation-delay:.05s}.d2{animation-delay:.10s}.d3{animation-delay:.15s}.d4{animation-delay:.20s}.d5{animation-delay:.25s}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .18s;white-space:nowrap;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.bp{background:var(--blue);color:#fff;}
.bp:hover:not(:disabled){background:var(--lblue);box-shadow:0 3px 12px rgba(21,101,192,.3);}
.bo{background:#fff;color:var(--blue);border:1.5px solid var(--blue);}
.bo:hover:not(:disabled){background:var(--lsky);}
.bg{background:#fff;color:var(--t2);border:1px solid var(--border);}
.bg:hover:not(:disabled){background:var(--offwhite);border-color:var(--sky);}
.brd{background:var(--redl);color:var(--red);border:1px solid var(--redb);}
.brd:hover:not(:disabled){background:var(--redb);}
.bgs{background:var(--greenl);color:var(--green);border:1px solid var(--greenb);}
.bgs:hover:not(:disabled){background:var(--greenb);}
.byw{background:var(--yellowl);color:var(--yellow);border:1px solid var(--yellowb);}
.sm{padding:6px 13px;font-size:12px;}
.xs{padding:4px 9px;font-size:11px;border-radius:5px;}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 1px 6px var(--shadow);}
/* Inputs */
.inp{width:100%;padding:9px 13px;background:#fff;border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none;transition:all .18s;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,.08);}
.inp::placeholder{color:var(--t3);}
select.inp option{background:#fff;}
textarea.inp{resize:vertical;min-height:60px;}
/* Badges */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.bgn{background:var(--greenl);color:var(--green);}
.brd2{background:var(--redl);color:var(--red);}
.byl{background:var(--yellowl);color:var(--yellow);}
.bbl{background:var(--lsky);color:var(--blue);}
.bpu{background:var(--purplel);color:var(--purple);}
.bnv{background:var(--navy);color:#fff;}
/* Table */
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:9px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);background:var(--bg);border-bottom:1.5px solid var(--border);}
td{padding:9px 14px;font-size:13px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--offwhite);}
/* Sidebar nav */
.sl{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:7px;cursor:pointer;transition:all .18s;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;}
.sl:hover,.sl.act{background:rgba(255,255,255,.13);color:#fff;}
.sl.act{background:rgba(255,255,255,.18);}
/* Toast */
.tc{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.ti{padding:11px 16px;border-radius:9px;font-size:13px;font-weight:500;animation:slideIn .3s;display:flex;align-items:center;gap:8px;min-width:230px;max-width:360px;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.ts{background:var(--greenl);border:1px solid var(--greenb);color:var(--green);}
.te{background:var(--redl);border:1px solid var(--redb);color:var(--red);}
.tin{background:var(--lsky);border:1px solid #90CAF9;color:var(--blue);}
.tw{background:var(--yellowl);border:1px solid var(--yellowb);color:var(--yellow);}
/* Cam */
.cam-box{width:100%;background:#0a0e1a;border-radius:10px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;border:2px solid var(--border);}
.scan-line{position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--sky),transparent);animation:scan 2s linear infinite;pointer-events:none;z-index:2;}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(13,33,55,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:12px;backdrop-filter:blur(3px);}
/* Labels */
.lbl{font-size:11px;color:var(--t2);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
/* Alerts */
.err-box{padding:9px 13px;background:var(--redl);border:1px solid var(--redb);border-radius:7px;font-size:12px;color:var(--red);display:flex;gap:7px;align-items:flex-start;}
.ok-box{padding:9px 13px;background:var(--greenl);border:1px solid var(--greenb);border-radius:7px;font-size:12px;color:var(--green);display:flex;gap:7px;}
.info-box{padding:9px 13px;background:var(--lsky);border:1px solid #90CAF9;border-radius:7px;font-size:12px;color:var(--blue);display:flex;gap:7px;}
.warn-box{padding:9px 13px;background:var(--yellowl);border:1px solid var(--yellowb);border-radius:7px;font-size:12px;color:var(--yellow);display:flex;gap:7px;}
/* Post */
.post-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px var(--shadow);}
.asgn-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:9px;box-shadow:0 1px 4px var(--shadow);transition:box-shadow .2s;}
.asgn-card:hover{box-shadow:0 3px 12px var(--shadow);}
/* Classroom card */
.cls-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px var(--shadow);}
.cls-card:hover{box-shadow:0 8px 24px var(--shadow);transform:translateY(-2px);}
/* Tabs */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;overflow-x:auto;}
.tab-btn{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--t2);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;white-space:nowrap;}
.tab-btn.act{color:var(--blue);border-bottom-color:var(--blue);}
/* Skeleton */
.skel{background:linear-gradient(90deg,#e8edf2 25%,#f5f7f9 50%,#e8edf2 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;}
/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
/* Notification dot */
.notif-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:1.5px solid #fff;}
/* Profile dropdown */
.dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:200px;z-index:200;overflow:hidden;}
.dd-item{display:flex;align-items:center;gap:9px;padding:11px 16px;font-size:13px;color:var(--text);cursor:pointer;transition:background .15s;}
.dd-item:hover{background:var(--offwhite);}



</style>
</head>

const getToken=()=>localStorage.getItem("nitj_tok");
const setToken=t=>localStorage.setItem("nitj_tok",t);
const clearToken=()=>localStorage.removeItem("nitj_tok");

async function api(path,opts={}){
  const tok=getToken();
  const hd={"Content-Type":"application/json",...(opts.headers||{})};
  if(tok)hd.Authorization="Bearer "+tok;
  let res;
  try{res=await fetch(API+path,{...opts,headers:hd});}
  catch(e){throw new Error("Backend offline. Run: uvicorn main:app --reload");}
  if(res.status===401){clearToken();window.location.reload();return;}
  if(!res.ok){
    let msg="Error "+res.status;
    try{const e=await res.json();if(typeof e.detail==="string")msg=e.detail;else if(Array.isArray(e.detail))msg=e.detail.map(x=>x.msg||JSON.stringify(x)).join("; ");}catch(ex){}
    throw new Error(msg);}
  return res.json();}

async function apiForm(path,fd){
  const tok=getToken();const hd={};if(tok)hd.Authorization="Bearer "+tok;
  const res=await fetch(API+path,{method:"POST",headers:hd,body:fd});
  if(!res.ok){const e=await res.json().catch(()=>({detail:"Error"}));throw new Error(e.detail||"Failed");}
  return res.json();}

// ── Forgot Password Flow ──────────────────────────────────────────
function ForgotPassword({onBack}){
  const[step,setStep]=useState(1);
  const[email,setEmail]=useState("");const[otp,setOtp]=useState("");const[otpHint,setOtpHint]=useState("");
  const[pass,setPass]=useState("");const[confirm,setConfirm]=useState("");
  const[ld,setLd]=useState(false);const[err,setErr]=useState("");const[msg,setMsg]=useState("");

  const sendOtp=async()=>{
    if(!email){setErr("Enter your email.");return;}setLd(true);setErr("");
    try{const r=await api("/forgot_password",{method:"POST",body:JSON.stringify({email})});
      setMsg(r.message);if(r.otp){setOtpHint(r.otp);}setStep(2);toast("OTP sent!","success");}
    catch(e){setErr(e.message);}setLd(false);};

  const reset=async()=>{
    if(!otp||!pass){setErr("Fill all fields.");return;}
    if(pass!==confirm){setErr("Passwords do not match.");return;}
    if(pass.length<6){setErr("Min 6 characters.");return;}
    setLd(true);setErr("");
    try{await api("/reset_password",{method:"POST",body:JSON.stringify({email,otp,new_password:pass})});
      toast("Password reset! Please login.","success");onBack();}
    catch(e){setErr(e.message);}setLd(false);};

    
  return(
    <div style={{display:"flex",flexDirection:"column",gap:13}}>
      <div style={{textAlign:"center",marginBottom:4}}>
        <div style={{fontSize:28}}>🔑</div>
        <h3 style={{fontSize:16,fontWeight:800,color:"var(--navy)"}}>{step===1?"Forgot Password":"Reset Password"}</h3>
        <p style={{fontSize:11,color:"var(--t3)",marginTop:2}}>{step===1?"Enter your email to receive OTP":"Enter OTP and new password"}</p>
      </div>
      {step===1?<>
        <div><label className="lbl">Registered Email</label>
          <input className="inp" type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)}/></div>
        {err&&<div className="err-box"><Ic d={IC.warn} s={13}/>{err}</div>}
        <button className="btn bp" style={{justifyContent:"center"}} onClick={sendOtp} disabled={ld}>
          {ld?<><Spin s={14}/>Sending OTP...</>:<><Ic d={IC.mail} s={14}/>Send OTP</>}</button>
      </>:<>
        {otpHint&&<div className="info-box"><Ic d={IC.warn} s={13}/><span>Demo OTP: <strong style={{fontFamily:"monospace",fontSize:14,letterSpacing:2}}>{otpHint}</strong></span></div>}
        <div><label className="lbl">Enter OTP</label>
          <input className="inp" placeholder="6-digit OTP" value={otp} onChange={e=>setOtp(e.target.value)} style={{fontFamily:"monospace",fontSize:18,letterSpacing:4,fontWeight:700}}/></div>
        <div><label className="lbl">New Password</label>
          <input className="inp" type="password" placeholder="Min 6 chars" value={pass} onChange={e=>setPass(e.target.value)}/></div>
        <div><label className="lbl">Confirm Password</label>
          <input className="inp" type="password" placeholder="Repeat" value={confirm} onChange={e=>setConfirm(e.target.value)}/></div>
        {err&&<div className="err-box"><Ic d={IC.warn} s={13}/>{err}</div>}
        <button className="btn bp" style={{justifyContent:"center"}} onClick={reset} disabled={ld}>
          {ld?<><Spin s={14}/>Resetting...</>:<><Ic d={IC.key} s={14}/>Reset Password</>}</button>
      </>}
      <button className="btn bg" style={{justifyContent:"center"}} onClick={onBack}>← Back to Login</button>
    </div>);}

function LoginForm({onAuth,sw}){
  const[f,setF]=useState({email:"",pass:""});const[sp,setSp]=useState(false);
  const[ld,setLd]=useState(false);const[err,setErr]=useState("");const[forgot,setForgot]=useState(false);
  if(forgot)return <ForgotPassword onBack={()=>setForgot(false)}/>;
  const sub=async e=>{e.preventDefault();setErr("");setLd(true);
    try{const r=await api("/login",{method:"POST",body:JSON.stringify({email:f.email,password:f.pass})});setToken(r.token);onAuth();toast(r.message,"success");}
    catch(e){setErr(e.message);}setLd(false);};
  return(<form onSubmit={sub}>
    <div style={{display:"flex",flexDirection:"column",gap:13}}>
      <div><label className="lbl">Email Address</label>
        <input className="inp" type="email" placeholder="your@email.com" value={f.email} onChange={e=>setF(p=>({...p,email:e.target.value}))} required/></div>
      <div><label className="lbl">Password</label>
        <div style={{position:"relative"}}>
          <input className="inp" type={sp?"text":"password"} placeholder="Your password" value={f.pass} onChange={e=>setF(p=>({...p,pass:e.target.value}))} required style={{paddingRight:40}}/>
          <button type="button" onClick={()=>setSp(!sp)} style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"var(--t3)"}}><Ic d={IC.eye} s={16}/></button>
        </div>
        <button type="button" onClick={()=>setForgot(true)} style={{marginTop:6,fontSize:12,color:"var(--blue)",background:"none",border:"none",cursor:"pointer",fontWeight:600,textAlign:"right",width:"100%"}}>Forgot Password?</button>
      </div>

      <button className="btn bp" type="submit" disabled={ld} style={{justifyContent:"center",padding:"11px"}}>

      <p style={{textAlign:"center",fontSize:12,color:"var(--t3)"}}>No account? <span style={{color:"var(--blue)",cursor:"pointer",fontWeight:600}} onClick={sw}>Register →</span></p>
    </div>
  </form>);}

function RegForm({onAuth,sw}){
  const[f,setF]=useState({name:"",email:"",password:"",confirm:"",department:""});
  const[sp,setSp]=useState(false);const[ld,setLd]=useState(false);const[err,setErr]=useState("");
  const upd=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const sub=async e=>{e.preventDefault();setErr("");
    if(!f.name.trim()){setErr("Full name required.");return;}
    if(f.password!==f.confirm){setErr("Passwords do not match.");return;}
    if(f.password.length<6){setErr("Password min 6 characters.");return;}
    setLd(true);
    try{const r=await api("/register",{method:"POST",body:JSON.stringify({name:f.name,email:f.email,password:f.password,department:f.department})});
      setToken(r.token);onAuth();toast(r.message,"success");}
    catch(e){setErr(e.message);}setLd(false);};
  return(<form onSubmit={sub}>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><label className="lbl">Full Name *</label><input className="inp" placeholder="Your full name" value={f.name} onChange={upd("name")} required/></div>
      <div><label className="lbl">Email *</label><input className="inp" type="email" placeholder="your@email.com" value={f.email} onChange={upd("email")} required/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><label className="lbl">Password *</label>
          <div style={{position:"relative"}}>
            <input className="inp" type={sp?"text":"password"} placeholder="Min 6 chars" value={f.password} onChange={upd("password")} required style={{paddingRight:34}}/>
            <button type="button" onClick={()=>setSp(!sp)} style={{position:"absolute",right:9,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"var(--t3)"}}><Ic d={IC.eye} s={14}/></button>
          </div></div>
        <div><label className="lbl">Confirm *</label><input className="inp" type="password" placeholder="Repeat" value={f.confirm} onChange={upd("confirm")} required/></div>
      </div>
      <div><label className="lbl">Department</label><input className="inp" placeholder="e.g. Computer Science" value={f.department} onChange={upd("department")}/></div>
      {err&&<div className="err-box"><Ic d={IC.warn} s={13}/>{err}</div>}
      <button className="btn bp" type="submit" disabled={ld} style={{justifyContent:"center",padding:"11px"}}>
        {ld?<><Spin s={14}/>Creating...</>:<><Ic d={IC.chk} s={14}/>Create Account</>}</button>
      <p style={{textAlign:"center",fontSize:12,color:"var(--t3)"}}>Have account? <span style={{color:"var(--blue)",cursor:"pointer",fontWeight:600}} onClick={sw}>Sign in →</span></p>
    </div>
  </form>);}

function AllAssignments(){
  const[asgns,setAsgns]=useState([]);const[ld,setLd]=useState(true);
  const[filter,setFilter]=useState("all");const[submitting,setSubmitting]=useState(null);const[subFile,setSubFile]=useState(null);
  const load=async()=>{setLd(true);try{setAsgns(await api("/all_assignments"));}catch(e){toast(e.message,"error");}setLd(false);};
  useEffect(()=>{load();},[]);
  const today=new Date().toISOString().split("T")[0];
  const filtered=asgns.filter(a=>{
    if(filter==="upcoming")return a.due_date>=today&&!a.my_submission;
    if(filter==="completed")return !!a.my_submission;
    if(filter==="overdue")return a.due_date<today&&!a.my_submission;
    return true;});
  const submit=async aid=>{if(!subFile){toast("Select a file","error");return;}
    const fd=new FormData();fd.append("assignment_id",aid);fd.append("file",subFile);
    try{const r=await apiForm("/submit_assignment",fd);toast(r.message,r.status==="late"?"warn":"success");setSubmitting(null);setSubFile(null);load();}
    catch(e){toast(e.message,"error");};};
  const counts={all:asgns.length,upcoming:asgns.filter(a=>a.due_date>=today&&!a.my_submission).length,completed:asgns.filter(a=>!!a.my_submission).length,overdue:asgns.filter(a=>a.due_date<today&&!a.my_submission).length};
  return(<div style={{display:"flex",flexDirection:"column",gap:14}}>
    {/* Filter tabs */}
    <div className="card" style={{padding:"12px 16px"}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        {[["all","All",counts.all,"var(--blue)"],["upcoming","⏰ Upcoming",counts.upcoming,"var(--green)"],["completed","✅ Completed",counts.completed,"var(--navy)"],["overdue","🔥 Overdue",counts.overdue,"var(--red)"]].map(([id,l,n,c])=>(
          <button key={id} className={"btn sm "+(filter===id?"bp":"bg")} onClick={()=>setFilter(id)}
            style={filter===id?{}:{color:c,borderColor:c+"44"}}>
            {l} <span style={{background:filter===id?"rgba(255,255,255,.25)":"var(--bg)",padding:"1px 6px",borderRadius:10,fontSize:10,marginLeft:2}}>{n}</span>
          </button>))}
        <button className="btn bg sm" style={{marginLeft:"auto"}} onClick={load}><Ic d={IC.ref} s={13}/></button>
      </div>
    </div>
    {ld?<div style={{padding:28,textAlign:"center"}}><Spin s={24}/></div>
    :filtered.length===0?<div className="card" style={{padding:32,textAlign:"center",color:"var(--t3)"}}><Ic d={IC.asgn} s={36} c="var(--border)"/><div style={{fontSize:13,marginTop:8}}>No assignments {filter!=="all"?"in this filter":""}</div></div>
    :filtered.map(a=>(
      <div key={a.id} className="asgn-card" style={{borderLeft:"4px solid "+(a.my_submission?"var(--green)":a.is_overdue?"var(--red)":"var(--blue)")}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <div style={{fontSize:14,fontWeight:700,color:"var(--navy)"}}>{a.title}</div>
              {a.my_submission&&<span className="bdg bgn" style={{fontSize:9}}>✅ {a.my_submission.status==="late"?"Late":"Submitted"}</span>}
              {!a.my_submission&&a.is_overdue&&<span className="bdg brd2" style={{fontSize:9}}>🔥 Overdue</span>}
              {!a.my_submission&&!a.is_overdue&&<span className="bdg byl" style={{fontSize:9}}>⏰ Pending</span>}
            </div>
            {a.description&&<div style={{fontSize:12,color:"var(--t2)",marginBottom:5}}>{a.description}</div>}
            <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
              <span className="bdg bbl" style={{fontSize:9}}>📚 {a.classroom_name}</span>
              <span className="bdg bpu" style={{fontSize:9}}>📖 {a.subject}</span>
              <span style={{fontSize:11,color:a.is_overdue&&!a.my_submission?"var(--red)":"var(--t3)",fontWeight:600}}>📅 Due: {a.due_date}</span>
              {a.file_url&&<a href={API+a.file_url} target="_blank" rel="noreferrer" className="btn bg xs"><Ic d={IC.dl} s={11}/>Attachment</a>}
            </div>
          </div>
          {!a.my_submission&&(submitting===a.id?
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <input type="file" onChange={e=>setSubFile(e.target.files[0])} style={{fontSize:11,color:"var(--t2)"}}/>
              <button className="btn bp xs" onClick={()=>submit(a.id)}>Submit</button>
              <button className="btn bg xs" onClick={()=>setSubmitting(null)}><Ic d={IC.x} s={11}/></button>
            </div>:
            <button className={"btn xs "+(a.is_overdue?"byw":"bgs")} onClick={()=>setSubmitting(a.id)}>
              {a.is_overdue?"Submit Late":"Submit Assignment"}</button>)}
        </div>
      </div>))}
  </div>);}

function JoinModal({user,onClose}){
  const[f,setF]=useState({code:"",roll_number:"",branch:"CSE",year:1,section:""});

  const stopCam=()=>{stream?.getTracks().forEach(t=>t.stop());setStream(null);setCamOn(false);};
  useEffect(()=>()=>stopCam(),[]);
  const capture=()=>{if(!vidRef.current)return;setPreview(capFrame(vidRef.current));stopCam();setErr("");};
  const join=async()=>{if(!f.code.trim()){setErr("Enter code.");return;}if(!f.roll_number.trim()){setErr("Enter roll number.");return;}setLd(true);setErr("");

        <div><label className="lbl">Roll Number *</label><input className="inp" placeholder="e.g. 21CSE001" value={f.roll_number} onChange={upd("roll_number")}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9}}>

          <div><label className="lbl">Section</label><select className="inp" value={f.section} onChange={upd("section")}>{["A","B","C","D"].map(s=><option key={s} value={s}>{s}</option>)}</select></div>

        <div style={{border:"1.5px solid var(--border)",borderRadius:10,padding:14,background:"var(--offwhite)"}}>

          <div className="cam-box" style={{aspectRatio:"4/3",maxHeight:170,marginBottom:9,borderColor:preview?"var(--green)":camOn?"var(--blue)":"var(--border)"}}>
            {camOn?<video ref={vidRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            :preview?<img src={preview} alt="face" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            :<div style={{textAlign:"center",padding:16,color:"#999"}}><Ic d={IC.cam} s={30} c="#ccc"/><div style={{fontSize:11,marginTop:6}}>Capture face for AI attendance recognition</div></div>}
          </div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {!camOn&&!preview&&<button type="button" className="btn bg sm" onClick={startCam}><Ic d={IC.cam} s={12}/>Open Camera</button>}
            {camOn&&<><button type="button" className="btn bgs sm" onClick={capture}><Ic d={IC.face} s={12}/>Capture</button><button type="button" className="btn bg sm" onClick={stopCam}><Ic d={IC.x} s={12}/>Cancel</button></>}
            {preview&&<><div className="ok-box" style={{flex:1,fontSize:11}}><Ic d={IC.chk} s={12}/>Face captured! 🔒 Will be locked after joining.</div><button type="button" className="btn bg sm" onClick={()=>{setPreview(null);startCam();}}><Ic d={IC.ref} s={11}/></button></>}

          <div style={{fontSize:10,color:"var(--t3)",marginTop:7}}>⚠️ Once face is registered, it cannot be changed by you. Contact teacher for updates.</div>
        </div>
        {err&&<div className="err-box"><Ic d={IC.warn} s={13}/>{err}</div>}
        <div style={{display:"flex",gap:10}}>
          <button className="btn bp" style={{flex:1,justifyContent:"center"}} onClick={join} disabled={ld}>{ld?<><Spin s={13}/>Joining...</>:<><Ic d={IC.jn} s={14}/>Join Classroom</>}</button>
          <button className="btn bg" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  </div>);}

            </p>
            <div style={{ display: "flex", gap: 10, marginTop: 8, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ background: "rgba(255,255,255,.15)", fontSize: 12, padding: "3px 10px", borderRadius: 5, fontFamily: "monospace", fontWeight: 700, letterSpacing: 2 }}>
                Code: {info.code}
              </span>
              <span style={{ fontSize: 11, color: "rgba(255,255,255,.7)" }}>👥 {info.member_count || 0}</span>
              <span style={{ fontSize: 11, color: "rgba(255,255,255,.7)" }}>👨‍🏫 {info.creator_name}</span>
              {isAdmin && <span style={{ background: "rgba(255,255,255,.2)", fontSize: 9, padding: "2px 8px", borderRadius: 10, fontWeight: 800 }}>YOU ARE ADMIN</span>}
              {!isAdmin && faceEnrolled && <span style={{ background: "rgba(16,185,129,.3)", fontSize: 9, padding: "2px 8px", borderRadius: 10, fontWeight: 700 }}>🔒 Face Locked</span>}
            </div>
          </div>
        </div>
      </div>

      {/* Face lock warnings */}
      {!isAdmin && faceEnrolled && faceLocked && (
        <div className="info-box" style={{ marginBottom: 12 }}>
          <Ic d={IC.shield} s={14} /> Your face is registered and locked. Contact teacher if you need to re-register.
        </div>
      )}
      {!isAdmin && !faceEnrolled && (
        <div className="warn-box" style={{ marginBottom: 12 }}>
          <Ic d={IC.warn} s={14} /> Face not enrolled. You won't be marked present via AI attendance.
        </div>
      )}

      {/* Tabs Navigation */}
      <div className="tab-bar">
        {tabs.map(([id, l]) => (
          <button key={id} className={"tab-btn" + (tab === id ? " act" : "")} onClick={() => setTab(id)}>
            {l}
          </button>
        ))}
      </div>

      {/* Tab Content */}
      {tab === "feed" && <ClassFeed cls={info} isAdmin={isAdmin} />}
      {tab === "members" && <MembersView cls={info} isAdmin={isAdmin} />}
      {tab === "assignments" && <AssignmentsView cls={info} isAdmin={isAdmin} user={user} />}
      {tab === "attendance" && <AttendanceView cls={info} isAdmin={isAdmin} />}
      {tab === "upload" && isAdmin && <UploadView cls={info} />}
      {tab === "take_atd" && isAdmin && <TakeAttendance cls={info} />}
      {tab === "face_mgmt" && isAdmin && <FaceManagement cls={info} user={user} />}
      {tab === "myatd" && !isAdmin && <MyAttendanceView cls={info} />}
    </div>
  );
}
// ── Feed ──────────────────────────────────────────────────────────
function ClassFeed({cls,isAdmin}){
  const[posts,setPosts]=useState([]);const[ld,setLd]=useState(true);
  const[showPost,setShowPost]=useState(false);const[form,setForm]=useState({title:"",content:"",type:"announcement"});const[posting,setPosting]=useState(false);
  const load=async()=>{setLd(true);try{setPosts(await api("/posts/"+cls.id));}catch(e){toast(e.message,"error");}setLd(false);};
  useEffect(()=>{load();},[cls.id]);
  const submit=async()=>{if(!form.title){toast("Title required","error");return;}setPosting(true);
    try{await api("/post",{method:"POST",body:JSON.stringify({classroom_id:cls.id,...form})});toast("Posted!","success");setShowPost(false);setForm({title:"",content:"",type:"announcement"});load();}
    catch(e){toast(e.message,"error");}setPosting(false);};
  const delPost=async pid=>{try{await api("/post/"+pid,{method:"DELETE"});toast("Deleted","success");load();}catch(e){toast(e.message,"error");};};

        <button className="btn bo sm" onClick={()=>{setForm(p=>({...p,type:"material"}));setShowPost(true);}}><Ic d={IC.upl} s={13}/>Share Note</button>
      </div>:<div style={{display:"flex",flexDirection:"column",gap:9}}>
        <div style={{display:"flex",gap:7}}>
          <button className={"btn sm"+(form.type==="announcement"?" bp":" bg")} onClick={()=>setForm(p=>({...p,type:"announcement"}))}>📢 Announcement</button>
          <button className={"btn sm"+(form.type==="material"?" bp":" bg")} onClick={()=>setForm(p=>({...p,type:"material"}))}>📄 Material</button>
        </div>
        <input className="inp" placeholder="Title *" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>
        <textarea className="inp" placeholder="Content (optional)..." value={form.content} onChange={e=>setForm(p=>({...p,content:e.target.value}))}/>
        <div style={{display:"flex",gap:7}}><button className="btn bp sm" onClick={submit} disabled={posting}>{posting?<><Spin s={12}/>...</>:"Post"}</button><button className="btn bg sm" onClick={()=>setShowPost(false)}>Cancel</button></div>
      </div>}
    </div>}
    {ld?<div style={{padding:24,textAlign:"center"}}><Spin s={22}/></div>
    :posts.length===0?<div className="card" style={{padding:28,textAlign:"center",color:"var(--t3)"}}><Ic d={IC.ann} s={32} c="var(--border)"/><div style={{marginTop:8,fontSize:13}}>No posts yet</div></div>
    :posts.map(p=><PostCard key={p.id} post={p} isAdmin={isAdmin} onDelete={()=>delPost(p.id)}/>)}
  </div>);}

function PostCard({post,isAdmin,onDelete}){

  const loadC=async()=>{setLdC(true);try{setCmts(await api("/comments/"+post.id));}catch(e){}setLdC(false);};
  const addC=async()=>{if(!cmt.trim())return;try{await api("/comment",{method:"POST",body:JSON.stringify({post_id:post.id,comment:cmt})});setCmt("");loadC();}catch(e){toast(e.message,"error");};};
  useEffect(()=>{if(showC)loadC();},[showC]);
  return(<div className="post-card">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
      <div style={{display:"flex",gap:9,alignItems:"flex-start"}}>
        <div style={{width:34,height:34,background:post.type==="announcement"?"var(--lsky)":"var(--greenl)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>
          {post.type==="announcement"?"📢":"📄"}</div>
        <div><div style={{fontSize:14,fontWeight:700,color:"var(--navy)"}}>{post.title}</div>
          <div style={{fontSize:10,color:"var(--t3)",marginTop:1}}>By {post.user_name} • {post.created_at?.split("T")?.[0]}</div></div>
      </div>
      {isAdmin&&<button className="btn brd xs" onClick={onDelete}><Ic d={IC.del} s={11}/></button>}

    {post.file_url&&<a href={API+post.file_url} target="_blank" rel="noreferrer" className="btn bg sm" style={{marginBottom:8,display:"inline-flex"}}><Ic d={IC.dl} s={12}/>Download: {post.file_name||"File"}</a>}
    <div style={{borderTop:"1px solid var(--border)",paddingTop:8,marginTop:4}}>
      <button className="btn bg xs" onClick={()=>setShowC(!showC)}>💬 {post.comment_count||0} Comments</button>
      {showC&&<div style={{marginTop:10}}>
        {ldC?<Spin s={14}/>:cmts.map(c=>(
          <div key={c.id} style={{padding:"7px 10px",background:"var(--offwhite)",borderRadius:7,marginBottom:6,border:"1px solid var(--border)"}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--navy)"}}>{c.user_name}</div>
            <div style={{fontSize:12,color:"var(--t2)",marginTop:2}}>{c.comment}</div>
          </div>))}
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <input className="inp" style={{flex:1,fontSize:12,padding:"7px 11px"}} placeholder="Add a comment..." value={cmt} onChange={e=>setCmt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addC()}/>
          <button className="btn bp sm" onClick={addC}>Post</button>
        </div>
      </div>}
    </div>
  </div>);}

// ── Face Management (Admin) ───────────────────────────────────────
function FaceManagement({cls,user}){
  const[members,setMembers]=useState([]);const[ld,setLd]=useState(true);
  const[target,setTarget]=useState(null);const[camOn,setCamOn]=useState(false);
  const[stream,setStream]=useState(null);const[preview,setPreview]=useState(null);
  const[note,setNote]=useState("");const[processing,setProcessing]=useState(false);
  const[audit,setAudit]=useState([]);const[showAudit,setShowAudit]=useState(false);
  const vidRef=useRef(null);

  const load=()=>{setLd(true);
    Promise.all([api("/classroom/"+cls.id+"/members"),api("/admin/face_audit/"+cls.id)])
      .then(([m,a])=>{setMembers(m.filter(x=>!x.is_admin));setAudit(a);})
      .catch(e=>toast(e.message,"error")).finally(()=>setLd(false));};
  useEffect(()=>{load();},[cls.id]);

  const startCam=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{width:480,height:360,facingMode:"user"}});setStream(s);setCamOn(true);setTimeout(()=>{if(vidRef.current)vidRef.current.srcObject=s;},80);}catch{toast("Camera denied","error");};};
  const stopCam=()=>{stream?.getTracks().forEach(t=>t.stop());setStream(null);setCamOn(false);};
  useEffect(()=>()=>stopCam(),[]);
  const capture=()=>{if(!vidRef.current)return;setPreview(capFrame(vidRef.current));stopCam();};

  const resetFace=async(withNewFace)=>{
    if(!target)return;
    if(!confirm(withNewFace?"Update this student's face data?":"Clear this student's face data?"))return;
    setProcessing(true);
    try{await api("/admin/reset_face",{method:"POST",body:JSON.stringify({classroom_id:cls.id,student_id:target.id,image:withNewFace?(preview||""):"",note})});
      toast(withNewFace?"Face updated!":"Face cleared!","success");setTarget(null);setPreview(null);setNote("");stopCam();load();}
    catch(e){toast(e.message,"error");}setProcessing(false);};

  return(<div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div className="card" style={{padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"var(--navy)"}}>🔒 Student Face Management</h3>
        <div style={{display:"flex",gap:7}}>
          <button className="btn bg xs" onClick={load}><Ic d={IC.ref} s={12}/></button>
          <button className="btn bo xs" onClick={()=>setShowAudit(!showAudit)}>📋 Audit Log</button>
        </div>
      </div>
      <div className="info-box" style={{marginBottom:12}}><Ic d={IC.shield} s={13}/><span>Students cannot change their face data. Only you (admin) can reset or update it here.</span></div>
      {ld?<Spin s={20}/>:<div style={{overflowX:"auto"}}>
        <table>
          <thead><tr><th>Student</th><th>Roll</th><th>Face Status</th><th>Last Updated</th><th>Actions</th></tr></thead>
          <tbody>{members.map((m,i)=>(
            <tr key={i}>
              <td style={{fontWeight:600}}>{m.name}</td>
              <td style={{fontFamily:"monospace",fontSize:12}}>{m.roll_number||"—"}</td>
              <td>{m.face_enrolled?<span className="bdg bgn" style={{fontSize:9}}>🔒 Enrolled</span>:<span className="bdg brd2" style={{fontSize:9}}>❌ Not Enrolled</span>}</td>
              <td style={{fontSize:10,color:"var(--t3)"}}>{m.face_updated_at?m.face_updated_at.split("T")[0]:"—"}</td>
              <td>
                <div style={{display:"flex",gap:5}}>
                  <button className="btn bo xs" onClick={()=>{setTarget(m);setPreview(null);setNote("");}}>Update Face</button>
                  {m.face_enrolled&&<button className="btn brd xs" onClick={async()=>{if(!confirm("Clear "+m.name+"'s face?"))return;setTarget(m);await resetFace(false);setTarget(null);}}>Clear</button>}
                </div>
              </td>
            </tr>))}</tbody>
        </table>
      </div>}
    </div>

    {/* Update face modal */}
    {target&&<div className="modal-bg">
      <div style={{background:"#fff",borderRadius:12,padding:22,width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
          <div><h3 style={{fontSize:15,fontWeight:800,color:"var(--navy)"}}>Update Face — {target.name}</h3>
            <p style={{fontSize:11,color:"var(--t3)",marginTop:1}}>Capture new face or clear existing</p></div>
          <button className="btn bg xs" onClick={()=>{setTarget(null);stopCam();}}><Ic d={IC.x} s={13}/></button>
        </div>
        <div className="cam-box" style={{aspectRatio:"4/3",maxHeight:160,marginBottom:10,borderColor:preview?"var(--green)":camOn?"var(--blue)":"var(--border)"}}>
          {camOn?<video ref={vidRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          :preview?<img src={preview} alt="face" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          :<div style={{textAlign:"center",padding:14,color:"#999"}}><Ic d={IC.face} s={28} c="#ccc"/><div style={{fontSize:11,marginTop:4}}>Camera preview</div></div>}
        </div>
        <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap"}}>
          {!camOn&&!preview&&<button className="btn bg sm" onClick={startCam}><Ic d={IC.cam} s={12}/>Camera</button>}
          {camOn&&<><button className="btn bgs sm" onClick={capture}><Ic d={IC.face} s={12}/>Capture</button><button className="btn bg sm" onClick={stopCam}><Ic d={IC.x} s={12}/>Cancel</button></>}
          {preview&&<><div className="ok-box" style={{flex:1,fontSize:11}}><Ic d={IC.chk} s={12}/>Ready</div><button className="btn bg sm" onClick={()=>{setPreview(null);startCam();}}><Ic d={IC.ref} s={11}/></button></>}
        </div>
        <div style={{marginBottom:12}}><label className="lbl">Note (optional)</label>
          <input className="inp" placeholder="Reason for update..." value={note} onChange={e=>setNote(e.target.value)}/></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn bp sm" onClick={()=>resetFace(true)} disabled={processing||!preview}>{processing?<><Spin s={12}/>...</>:"✅ Update Face"}</button>
          <button className="btn brd sm" onClick={()=>{if(confirm("Clear face?"))resetFace(false);}} disabled={processing}>🗑️ Clear Face</button>
          <button className="btn bg sm" onClick={()=>{setTarget(null);stopCam();}}>Cancel</button>
        </div>
      </div>
    </div>}

    {/* Audit log */}
    {showAudit&&<div className="card" style={{padding:16}}>
      <h4 style={{fontSize:13,fontWeight:700,color:"var(--navy)",marginBottom:12}}>📋 Face Audit Log</h4>
      {audit.length===0?<div style={{textAlign:"center",color:"var(--t3)",padding:12}}>No audit entries.</div>
      :<div style={{overflowX:"auto"}}><table>
        <thead><tr><th>Student</th><th>Action</th><th>By</th><th>Date</th><th>Note</th></tr></thead>
        <tbody>{audit.map((a,i)=>(
          <tr key={i}>
            <td style={{fontWeight:600}}>{a.student_name}</td>
            <td><span className={"bdg "+(a.action.includes("clear")?"brd2":a.action.includes("admin")?"byl":"bgn")} style={{fontSize:9}}>{a.action}</span></td>
            <td style={{fontSize:12}}>{a.performed_by_name}</td>
            <td style={{fontSize:11,color:"var(--t3)"}}>{a.performed_at?.split("T")?.[0]}</td>
            <td style={{fontSize:11,color:"var(--t3)"}}>{a.note||"—"}</td>
          </tr>))}</tbody>
      </table></div>}
    </div>}
  </div>);}

// ── Assignments View ──────────────────────────────────────────────
function AssignmentsView({cls,isAdmin,user}){
  const[asgns,setAsgns]=useState([]);const[ld,setLd]=useState(true);

  useEffect(()=>{load();},[cls.id]);
  const updateDD=async aid=>{if(!newDD)return;try{await api("/assignment/"+aid+"/due_date",{method:"PUT",body:JSON.stringify({assignment_id:aid,due_date:newDD})});toast("Updated","success");setEditDD(null);load();}catch(e){toast(e.message,"error");};};
  const delA=async aid=>{if(!confirm("Delete?"))return;try{await api("/assignment/"+aid,{method:"DELETE"});toast("Deleted","success");load();}catch(e){toast(e.message,"error");};};
  const submit=async aid=>{if(!subFile){toast("Select file","error");return;}const fd=new FormData();fd.append("assignment_id",aid);fd.append("file",subFile);
    try{const r=await apiForm("/submit_assignment",fd);toast(r.message,r.status==="late"?"warn":"success");setSubmitting(null);setSubFile(null);load();}catch(e){toast(e.message,"error");};};
  const loadSubs=async aid=>{try{setViewSubs({aid,subs:await api("/submissions/"+aid)});}catch(e){toast(e.message,"error");};};
  const today=new Date().toISOString().split("T")[0];
  return(<div>
    {isAdmin&&<div style={{marginBottom:12,display:"flex",gap:8}}><button className="btn bp sm" onClick={()=>setShowCreate(true)}><Ic d={IC.add} s={13}/>Create Assignment</button><button className="btn bg sm" onClick={load}><Ic d={IC.ref} s={13}/></button></div>}
    {showCreate&&<CreateAssignmentModal cls={cls} onClose={()=>{setShowCreate(false);load();}}/>}
    {viewSubs&&<SubmissionsModal data={viewSubs} onClose={()=>setViewSubs(null)}/>}
    {ld?<div style={{padding:22,textAlign:"center"}}><Spin s={22}/></div>
    :asgns.length===0?<div className="card" style={{padding:28,textAlign:"center",color:"var(--t3)"}}><Ic d={IC.task} s={32} c="var(--border)"/><div style={{marginTop:8,fontSize:13}}>No assignments</div></div>
    :asgns.map(a=>(
      <div key={a.id} className="asgn-card" style={{borderLeft:"4px solid "+(a.my_submission?"var(--green)":a.is_overdue?"var(--red)":"var(--blue)")}}>

          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>

            </div>

            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>

              {isAdmin&&<span className="bdg bbl" style={{fontSize:9}}>📬 {a.submission_count||0} subs</span>}

// ── Take Attendance ───────────────────────────────────────────────
function TakeAttendance({cls}){
  const[camOn,setCamOn]=useState(false);const[recog,setRecog]=useState(false);
  const[detected,setDetected]=useState([]);const[stream,setStream]=useState(null);const[ok,setOk]=useState(true);
  const vidRef=useRef(null);const intRef=useRef(null);
  const startCam=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});setStream(s);setCamOn(true);setTimeout(()=>{if(vidRef.current)vidRef.current.srcObject=s;},80);toast("Camera ready","success");}catch{toast("Camera denied","error");};};
  const stopAll=()=>{stream?.getTracks().forEach(t=>t.stop());setStream(null);setCamOn(false);setRecog(false);if(intRef.current)clearInterval(intRef.current);};
  useEffect(()=>()=>stopAll(),[]);
  const startRecog=()=>{setRecog(true);toast("AI Recognition started","info");
    intRef.current=setInterval(async()=>{if(!vidRef.current||vidRef.current.readyState<2)return;
      try{const res=await api("/recognize",{method:"POST",body:JSON.stringify({classroom_id:cls.id,image:capFrame(vidRef.current)})});
        setOk(true);if(res.status==="no_face"||!res.results)return;
        for(const r of res.results){setDetected(p=>[{...r,ts:new Date().toLocaleTimeString()},...p].slice(0,30));
          if(r.status==="present")toast(`✅ ${r.name} — ${r.confidence?.toFixed(1)}% Match`,"success");
          else if(r.status==="duplicate")toast(`🔁 ${r.name} already marked`,"info");
          else if(r.status==="unknown")toast("❓ Unknown student","warn");
          else if(r.status==="error")toast(r.message,"warn");
        }
      }catch(e){setOk(false);setRecog(false);clearInterval(intRef.current);toast(e.message,"error");}},3000);};
  const markAbsent=async()=>{try{await api("/mark_absent/"+cls.id,{method:"POST"});toast("Absent students marked","success");}catch(e){toast(e.message,"error");};};
  const presentN=detected.filter(d=>d.status==="present").length;
  return(<div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div className="card" style={{padding:14}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        {!camOn?<button className="btn bp" onClick={startCam}><Ic d={IC.cam} s={14}/>Start Camera</button>:<button className="btn brd" onClick={stopAll}><Ic d={IC.x} s={14}/>Stop</button>}
        {camOn&&!recog&&<button className="btn bgs" onClick={startRecog}><Ic d={IC.face} s={14}/>Start AI Recognition</button>}
        {recog&&<button className="btn bg" onClick={()=>{setRecog(false);clearInterval(intRef.current);}}><Ic d={IC.x} s={14}/>Pause</button>}
        {detected.length>0&&<button className="btn bg sm" onClick={markAbsent}>Mark Remaining Absent</button>}
        {!ok&&<span style={{fontSize:11,color:"var(--red)",fontWeight:600}}>⚠️ Backend offline</span>}
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 290px",gap:14}}>
      <div className="card" style={{padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
          <h3 style={{fontSize:13,fontWeight:700,color:"var(--navy)"}}>📷 Live Camera</h3>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {recog&&<span className="bdg bgn"><span style={{width:6,height:6,background:"var(--green)",borderRadius:"50%",display:"inline-block",animation:"pulse2 1.5s infinite",marginRight:3}}/>LIVE</span>}
            {presentN>0&&<span className="bdg bbl">{presentN} marked</span>}
          </div>
        </div>
        <div className="cam-box" style={{aspectRatio:"16/9",borderColor:camOn?"var(--blue)":"var(--border)"}}>
          {camOn?<><video ref={vidRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>{recog&&<div className="scan-line"/>}</>
          :<div style={{textAlign:"center",padding:28,color:"#aaa"}}><Ic d={IC.cam} s={40} c="#ddd"/><div style={{fontSize:12,marginTop:8}}>Camera not active</div></div>}
        </div>
        <div style={{marginTop:9,padding:"7px 11px",background:"var(--lsky)",borderRadius:7,border:"1px solid #90CAF9"}}>
          <p style={{fontSize:11,color:"var(--blue)"}}>🔒 Only students of <strong>{cls.name}</strong> with registered faces will be recognized</p>
        </div>
      </div>
      {/* Detection log */}
      <div className="card" style={{padding:13,display:"flex",flexDirection:"column",maxHeight:430}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,flexShrink:0}}>
          <h3 style={{fontSize:13,fontWeight:700,color:"var(--navy)"}}>Detection Log</h3>
          {detected.length>0&&<button className="btn bg xs" onClick={()=>setDetected([])}>Clear</button>}
        </div>
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
          {detected.length===0?<div style={{textAlign:"center",color:"var(--t3)",padding:"18px 0"}}><Ic d={IC.face} s={28} c="var(--border)"/><div style={{fontSize:11,marginTop:5}}>No detections yet</div></div>
          :detected.map((d,i)=>(
            <div key={i} style={{padding:"9px 11px",borderRadius:8,border:"1.5px solid "+(d.status==="present"?"var(--greenb)":d.status==="duplicate"?"#90CAF9":d.status==="unknown"?"var(--yellowb)":"var(--redb)"),background:d.status==="present"?"var(--greenl)":d.status==="duplicate"?"var(--lsky)":d.status==="unknown"?"var(--yellowl)":"var(--redl)",animation:i===0?"fadeUp .3s":"none"}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div style={{fontSize:12,fontWeight:700,color:d.status==="present"?"var(--green)":d.status==="duplicate"?"var(--blue)":d.status==="unknown"?"var(--yellow)":"var(--red)"}}>{d.name||"Unknown Student"}</div>
                <span style={{fontSize:10,fontWeight:800,color:d.status==="present"?"var(--green)":d.status==="duplicate"?"var(--blue)":d.status==="unknown"?"var(--yellow)":"var(--red)"}}>
                  {d.status==="present"?"✅":d.status==="duplicate"?"🔁":d.status==="unknown"?"❓":"⚠️"} {d.status}</span>
              </div>
              {d.confidence!=null&&<div style={{fontSize:11,marginTop:2,color:"var(--t2)"}}>Match: <strong>{d.confidence?.toFixed(1)}%</strong>{d.roll&&` • ${d.roll}`}</div>}
              <div style={{fontSize:10,color:"var(--t3)",marginTop:1}}>{d.ts}</div>
            </div>))}
        </div>
      </div>
    </div>
  </div>);}

  if(!user)return <><AuthPage onAuth={onAuth}/><Toasts/></>;

  const sw=col?62:232;
  const navSetAv=v=>{setAv(v);if(v!=="classroom")setActiveCls(null);if(v==="notifications")loadNotifs();};
  const titles={dash:"Dashboard",classrooms:"All Classrooms",assignments:"Assignments",myattend:"My Attendance",notifications:"Notifications",classroom:"Classroom"};

  return(<div style={{minHeight:"100vh",background:"var(--bg)"}}>

          ?<ClassroomPage cls={activeCls} user={user} goBack={()=>{setActiveCls(null);setAv("classrooms");}}/>

          :av==="myattend"?<MyAllAttendance/>
          :av==="notifications"?<NotificationsPage/>
          :<Dashboard user={user} setAv={navSetAv} setActiveCls={setActiveCls}/>}
      </main>
    </div>
    <Toasts/>
  </div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
